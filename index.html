<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fréquence</title>
<style>
  :root{
    --bg:#12141A;
    --surface:#1B1E27;
    --surface2:#232733;
    --line:#2C303C;
    --text:#EDEEF2;
    --muted:#8A8FA3;
    --muted2:#5C6072;
    --signal:#E8A33D;
    --pulse:#4FD8D0;
    --danger:#E85D4A;
    --good:#6FCF97;
    --warm:#F0A868;
    --cool:#5FB8D4;
    --radius:10px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Inter','Helvetica Neue',Arial,sans-serif; -webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono','SF Mono',Menlo,monospace;}
  button{font-family:inherit;}
  h1,h2,h3{margin:0; font-weight:700; letter-spacing:-0.01em;}
  ::selection{background:var(--signal); color:#12141A;}
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{ outline:2px solid var(--pulse); outline-offset:2px; }

  #app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  header.top{
    position:sticky; top:0; z-index:20; background:rgba(18,20,26,0.95); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); padding:12px 16px 0;
  }
  .brand-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .brand{font-size:18px; font-weight:800; letter-spacing:-0.02em;}
  .gear-btn{background:none; border:none; color:var(--muted); font-size:18px; padding:4px; cursor:pointer;}

  /* Overall program progress — motivating, at a glance */
  .program-bar-wrap{margin-bottom:10px;}
  .program-bar-track{height:6px; border-radius:4px; background:var(--surface2); overflow:hidden;}
  .program-bar-fill{height:100%; background:linear-gradient(90deg, var(--pulse), var(--signal)); border-radius:4px; transition:width .3s;}
  .program-bar-label{display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-top:4px;}

  .week-stepper{display:flex; align-items:center; gap:10px; padding-bottom:10px;}
  .week-arrow{width:32px; height:32px; border-radius:8px; background:var(--surface); border:1px solid var(--line); color:var(--text); font-size:15px; cursor:pointer; flex-shrink:0;}
  .week-track{flex:1; display:flex; gap:4px;}
  .week-dot{flex:1; height:34px; border-radius:6px; background:var(--surface); border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--muted2); cursor:pointer; position:relative;}
  .week-dot.current{background:var(--text); color:var(--bg); border-color:var(--text); font-weight:700;}
  .week-dot .pct{font-size:8px; opacity:0.7; margin-top:1px;}
  .week-dot.full{border-color:var(--good);}
  .week-dot.full::after{content:"✓"; position:absolute; top:-6px; right:-4px; width:14px; height:14px; border-radius:50%; background:var(--good); color:#0c1a12; font-size:8.5px; display:flex; align-items:center; justify-content:center;}
  .phase-label{text-align:center; font-size:10px; color:var(--signal); letter-spacing:0.06em; text-transform:uppercase; padding-bottom:10px; font-family:'IBM Plex Mono',monospace;}

  nav.days{display:flex; gap:6px; overflow-x:auto; padding:0 16px 12px; scrollbar-width:none;}
  nav.days::-webkit-scrollbar{display:none;}
  .day-btn{flex-shrink:0; background:var(--surface); border:1px solid var(--line); color:var(--muted); padding:8px 13px; border-radius:20px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap; position:relative;}
  .day-btn.active{background:var(--text); color:var(--bg); border-color:var(--text);}
  .day-btn .grp{display:block; font-size:9px; font-weight:500; opacity:0.65; margin-top:1px;}
  .day-btn.complete::before{content:"✓"; position:absolute; top:-5px; right:-4px; width:15px; height:15px; border-radius:50%; background:var(--good); color:#0c1a12; font-size:9px; display:flex; align-items:center; justify-content:center;}

  main{flex:1; padding:14px 16px 40px;}

  .day-header{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;}
  .day-header h2{font-size:16px;}
  .day-progress{font-size:11.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}

  .week-brief{background:#B8E8E2; border:1px solid #7DCFC5; border-left:4px solid #2E9C8F; border-radius:0 var(--radius) var(--radius) 0; padding:13px 14px; margin-bottom:16px;}
  .week-brief .wb-title{font-size:13px; font-weight:800; color:#0A2E28; letter-spacing:0.02em; margin-bottom:6px;}
  .week-brief .wb-text{font-size:13.5px; font-weight:500; line-height:1.6; color:#000000;}

  .complete-banner{display:none; background:linear-gradient(90deg, rgba(111,207,151,0.15), rgba(79,216,208,0.1)); border:1px solid rgba(111,207,151,0.35); color:var(--good); font-size:12.5px; font-weight:600; padding:10px 12px; border-radius:9px; margin-bottom:12px; text-align:center;}
  .complete-banner.show{display:block;}

  /* Warm-up / stretch blocks */
  .flow-card{border-radius:var(--radius); padding:13px 14px; margin-bottom:12px; border:1px solid var(--line);}
  .flow-card.warmup{background:#F0C89A; border-color:#E0A868;}
  .flow-card.stretch{background:#BCE4EC; border-color:#8FCBD8;}
  .flow-head{display:flex; align-items:center; gap:7px; cursor:pointer;}
  .flow-icon{font-size:14px;}
  .flow-title{font-size:13.5px; font-weight:700; letter-spacing:0.01em; color:#1A1408;}
  .flow-card.stretch .flow-title{color:#0D2226;}
  .flow-sub{font-size:10.5px; color:#4A3E28; margin-left:auto; font-family:'IBM Plex Mono',monospace;}
  .flow-card.stretch .flow-sub{color:#2C4448;}
  .flow-list{display:none; margin:12px 0 0; padding:0; list-style:none;}
  .flow-list.show{display:block;}
  .flow-list li{font-size:14.5px; font-weight:600; color:#000000; padding:7px 0 7px 20px; position:relative; line-height:1.6; letter-spacing:0.01em;}
  .flow-list li::before{content:"•"; position:absolute; left:2px; top:7px; color:#5A4A2E; font-size:14px;}
  .flow-card.stretch .flow-list li::before{color:#2C4448;}
  .flow-list li b{font-weight:800;}

  .exercise-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:10px;}
  .ex-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .ex-name{font-size:14.5px; font-weight:700; line-height:1.3;}
  .ex-idx{color:var(--muted2); font-family:'IBM Plex Mono',monospace; font-size:12px; margin-right:6px;}

  .progress-line{display:flex; align-items:center; gap:6px; margin-top:8px; padding:7px 9px; background:var(--surface2); border-radius:7px;}
  .progress-line .arrow{font-size:13px; font-weight:800;}
  .progress-line .arrow.up{color:var(--good);}
  .progress-line .arrow.down{color:var(--danger);}
  .progress-line .arrow.flat{color:var(--muted2);}
  .progress-text{font-size:11.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}
  .progress-text b{color:var(--text); font-weight:700;}

  .ex-meta{display:flex; gap:8px; margin-top:9px; flex-wrap:wrap; align-items:center;}
  .meta-chip{font-size:10.5px; font-family:'IBM Plex Mono',monospace; color:var(--muted); background:var(--surface2); padding:3px 7px; border-radius:5px;}
  .meta-chip.rir{color:var(--signal); background:rgba(232,163,61,0.1);}
  .tempo-toggle{background:none; border:none; color:var(--pulse); font-size:10.5px; font-family:'IBM Plex Mono',monospace; cursor:pointer; padding:3px 0;}
  .tip-toggle{background:none; border:none; color:var(--signal); font-size:10.5px; font-family:'IBM Plex Mono',monospace; cursor:pointer; padding:3px 0;}
  .tip-detail{display:none; margin-top:9px; font-size:13px; line-height:1.5; color:var(--text); background:var(--surface2); border-left:2px solid var(--signal); padding:9px 11px; border-radius:0 7px 7px 0;}
  .tip-detail.show{display:block;}
  .tempo-detail{display:none; margin-top:8px;}
  .tempo-detail.show{display:block;}
  .tempo-strip{display:flex; border-radius:6px; overflow:hidden; height:5px;}
  .tempo-seg{flex:1;}
  .tempo-seg.ecc{background:var(--pulse);}
  .tempo-seg.pause{background:var(--muted2);}
  .tempo-seg.con{background:var(--signal);}
  .tempo-legend{display:flex; gap:12px; margin-top:5px; font-size:9.5px; color:var(--muted2); font-family:'IBM Plex Mono',monospace;}

  .sets{margin-top:12px; display:flex; flex-direction:column; gap:6px;}
  .set-row{display:grid; grid-template-columns:22px 1fr 1fr 40px; gap:8px; align-items:center;}
  .set-num{font-size:11px; color:var(--muted2); font-family:'IBM Plex Mono',monospace;}
  .set-row input[type=number]{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:8px; font-size:14px; font-family:'IBM Plex Mono',monospace;}
  .set-row input::placeholder{color:var(--muted2);}
  .set-row input.is-suggested{color:var(--signal); border-color:rgba(232,163,61,0.4); background:rgba(232,163,61,0.06);}
  .done-toggle{width:38px; height:38px; border-radius:8px; border:1px solid var(--line); background:var(--surface2); color:var(--muted); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .done-toggle.on{background:var(--good); border-color:var(--good); color:#0c1a12;}
  .set-actions{display:flex; gap:8px; margin-top:9px;}
  .mini-btn{background:none; border:1px dashed var(--line); color:var(--muted); font-size:11.5px; padding:6px 10px; border-radius:6px; cursor:pointer;}
  .rest-btn{background:var(--surface2); border:1px solid var(--line); color:var(--pulse);}
  .pr-badge{font-size:10px; color:#0c1a12; background:var(--signal); padding:2px 6px; border-radius:4px; font-weight:700; margin-left:6px; white-space:nowrap;}

  .modal-overlay{position:fixed; inset:0; background:rgba(12,13,17,0.85); backdrop-filter:blur(4px); z-index:60; display:none; align-items:flex-end; justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal-sheet{width:100%; max-width:520px; background:var(--surface); border-radius:16px 16px 0 0; padding:18px 16px 28px; border:1px solid var(--line); border-bottom:none;}
  .modal-sheet h3{font-size:15px; margin-bottom:12px;}
  textarea{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:10px; font-family:'IBM Plex Mono',monospace; font-size:11px; min-height:90px;}
  .io-row{display:flex; gap:8px; margin-top:8px;}
  .io-btn{flex:1; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:11px; border-radius:8px; font-size:12.5px; cursor:pointer;}
  .modal-close{width:100%; margin-top:14px; background:none; border:none; color:var(--muted); padding:8px; font-size:13px;}

  .timer-overlay{position:fixed; inset:0; background:rgba(12,13,17,0.92); backdrop-filter:blur(6px); z-index:50; display:none; align-items:center; justify-content:center; flex-direction:column;}
  .timer-overlay.show{display:flex;}
  .timer-num{font-family:'IBM Plex Mono',monospace; font-size:64px; font-weight:700; color:var(--pulse);}
  .timer-label{color:var(--muted); font-size:13px; margin-top:6px;}
  .timer-close{margin-top:26px; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:10px 22px; border-radius:20px; cursor:pointer;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="brand-row">
      <div class="brand">Fréquence</div>
      <button class="gear-btn" id="gearBtn" aria-label="Réglages">⚙</button>
    </div>
    <div class="program-bar-wrap">
      <div class="program-bar-track"><div class="program-bar-fill" id="programBarFill" style="width:0%"></div></div>
      <div class="program-bar-label"><span id="programBarText">0% du programme</span><span id="programStreak"></span></div>
    </div>
    <div class="week-stepper">
      <button class="week-arrow" id="weekPrev">‹</button>
      <div class="week-track" id="weekTrack"></div>
      <button class="week-arrow" id="weekNext">›</button>
    </div>
    <div class="phase-label" id="phaseLabel"></div>
    <nav class="days" id="dayNav"></nav>
  </header>

  <main>
    <div class="week-brief" id="weekBrief"></div>
    <div class="day-header">
      <h2 id="dayTitle"></h2>
      <div class="day-progress mono" id="dayProgress"></div>
    </div>
    <div class="complete-banner" id="completeBanner">Séance terminée 💪 Bien joué.</div>
    <div id="warmupSlot"></div>
    <div id="exerciseList"></div>
    <div id="stretchSlot"></div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <h3>Données</h3>
    <button class="io-btn" id="exportBtn" style="width:100%;">Copier les données (JSON)</button>
    <div style="margin-top:12px;">
      <textarea id="importArea" placeholder="Colle un export JSON ici pour importer..."></textarea>
      <div class="io-row">
        <button class="io-btn" id="importBtn">Importer</button>
        <button class="io-btn" id="resetBtn" style="color:var(--danger);">Réinitialiser</button>
      </div>
    </div>
    <button class="modal-close" id="modalClose">Fermer</button>
  </div>
</div>

<div class="timer-overlay" id="timerOverlay">
  <div class="timer-num mono" id="timerNum">02:00</div>
  <div class="timer-label" id="timerLabel">Repos</div>
  <button class="timer-close" id="timerClose">Fermer</button>
</div>

<script>
(function(){
"use strict";

/* ---------- PROGRAM DEFINITION ---------- */
const PROGRAM = {
  lundi:   { title:"Pecs + Triceps", sub:"dominant", groups:["pecs","triceps"],
    warmup:["<b>Général</b> — 2-3 min vélo/rameur léger ou 30 jumping jacks, pour élever la température tissulaire","<b>Articulaire</b> — rotations d'épaules 20x avant/arrière, cercles de poignets 15x","<b>Activation</b> — écartés légers au poids du corps 15 reps + pompes à vide 2×10","<b>Potentiation</b> — barre à vide sur le banc décliné 1×10, puis 1 série à 50% de la charge de travail"],
    stretch:["Pecs en appui sur cadre de porte, 30s/côté — expire en relâchant l'épaule vers l'arrière","Triceps bras au-dessus de la tête, 30s/côté, tension légère sans forcer le coude","Croisé de l'épaule avant, 20s/côté — restaure l'amplitude après le travail en press","Respiration diaphragmatique, 3-4 cycles lents pour clôturer"],
    exercises:[
      {id:"decline",  name:"Développé décliné (barre libre)", tempo:[2,0,1,0], rir:[2,1], tip:"Coudes à ~45° du buste (pas collés) pour cibler le bas du pec, omoplates serrées. Descends jusqu'au contact léger, ne rebondis pas sur la poitrine."},
      {id:"inclineSm",name:"Incliné (Smith)", tempo:[2,1,1,0], rir:[1,0.5], tip:"Banc à 30-45°, pas plus — au-delà les épaules prennent le relais du haut du pec. Vise la clavicule, pas le cou."},
      {id:"dips",     name:"Dips lestés", tempo:[2,0,1,0], rir:[1,0.5], tip:"Buste penché en avant pour cibler les pecs, coudes qui s'écartent légèrement. Descends jusqu'à un étirement franc, sans forcer si l'épaule tire."},
      {id:"pushup",   name:"Pompes lestées", tempo:[2,0,1,0], rir:[1,0], tip:"Corps aligné tête-talons, pas de creux lombaire. Amplitude complète plutôt que vitesse d'exécution."},
      {id:"triOhInc", name:"Triceps au-dessus tête (banc incliné, barre spéciale)", tempo:[3,1,1,0], rir:[1,0], tip:"Coudes fixes proches de la tête tout le mouvement. Le banc incliné maximise l'étirement du chef long en bas — la portion la plus productive pour l'hypertrophie."},
      {id:"triRopeExt",name:"Triceps corde (rotation externe)", tempo:[2,1,1,1], rir:[0.5,0], tip:"Coudes collés au corps, écarte les mains en fin de mouvement pour une contraction maximale du chef latéral. Pas de balancement du buste."},
    ]},
  mardi:   { title:"Dos + Biceps", sub:"dominant", groups:["dos","biceps"],
    warmup:["<b>Général</b> — 2-3 min rameur léger ou corde à sauter douce","<b>Articulaire</b> — rotations scapulaires 20x, cat-cow 10 reps lentes","<b>Activation</b> — tirage vertical à la poulie à vide 1×15, row léger à vide 1×12","<b>Potentiation</b> — 1 série à 50-60% de la charge de travail sur le premier exercice"],
    stretch:["Grand dorsal, bras tendu latéral en appui, 30s/côté, respiration lente","Biceps, bras tendu derrière le dos, 20s/côté","Torsion douce du buste assise, 20s/côté — décompresse la colonne après les tirages","Respiration diaphragmatique, 3-4 cycles"],
    exercises:[
      {id:"tirageUniInc", name:"Tirage vertical unilatéral (banc incliné)", tempo:[2,1,2,1], rir:[1,0.5], tip:"Le coude mène le mouvement vers la hanche, pas la main. Étirement complet en haut avant de retirer."},
      {id:"australienne", name:"Traction australienne lestée", tempo:[2,0,1,1], rir:[1.5,1], tip:"Corps gainé et rigide comme une planche, tire la poitrine vers la barre sans casser les hanches. Descente contrôlée, pas de chute libre."},
      {id:"tirageSerre",  name:"Tirage horizontal prise serrée", tempo:[2,0,1,1], rir:[1,0.5], tip:"Buste stable, coudes qui reculent en serrant les omoplates en fin de mouvement — comme presser une orange entre les omoplates."},
      {id:"rowUniPenche", name:"Row unilatéral haltère (buste penché, prise neutre)", tempo:[2,0,1,1], rir:[1,0], tip:"Coude proche du corps pour cibler le lat, dos plat — pas de rotation du buste pour tricher les dernières reps."},
      {id:"curlBarre",    name:"Curl barre", tempo:[2,0,1,1], rir:[0.5,0], tip:"Coudes fixes le long du corps toute l'amplitude — la triche classique est de les projeter en avant pour aider la remontée."},
      {id:"curlIncline",  name:"Curl incliné", tempo:[3,1,1,0], rir:[0.5,0], tip:"Bras derrière le corps sur le banc incliné pour maximiser l'étirement du biceps en bas, la position la plus productive sur ce mouvement."},
    ]},
  mercredi:{ title:"Jambes", sub:"", groups:["jambes"],
    warmup:["<b>Général</b> — 3 min vélo ou marche rapide, élever la température des grands groupes musculaires","<b>Articulaire</b> — leg swings avant/arrière et latéraux 15x/jambe, cercles de cheville 10x/côté","<b>Activation</b> — squats au poids du corps 2×15, pont fessier 1×15","<b>Potentiation</b> — 1 série de squat à 50% de la charge de travail"],
    stretch:["Quadriceps debout, 30s/côté, bassin gainé","Ischio-jambiers assis, 30s/côté, dos droit","Mollets contre un mur, 30s/côté","Fessiers (figure 4 au sol), 20s/côté","Respiration diaphragmatique, 4-5 cycles — les jambes sont le groupe le plus exigeant en système nerveux, prends le temps de redescendre"],
    exercises:[
      {id:"squat",     name:"Squat (barre libre)", tempo:[2,0,1,0], rir:[2,1], tip:"Descends jusqu'à ce que les hanches passent sous les genoux, genoux dans l'axe des pieds. La profondeur prime sur la charge."},
      {id:"goodmorning",name:"Good Morning (barre libre)", tempo:[2,1,2,0], rir:[2,1.5], tip:"La hanche recule en premier, dos neutre gainé tout le mouvement, genoux légèrement fléchis et fixes. Démarre très léger le temps que la technique soit solide."},
      {id:"hipthrust", name:"Hip thrust (Smith)", tempo:[2,0,1,1], rir:[1,0.5], tip:"Menton rentré, pousse par les talons, verrouille en extension complète avec une pause d'1s en haut — c'est là que le fessier travaille vraiment."},
      {id:"legext",    name:"Leg extension (poulie basse, unilatéral)", tempo:[2,0,1,1], rir:[0.5,0], tip:"Légère rotation externe de la pointe de pied pour le vaste interne, pause 1s en extension complète pour compenser la faible tension de la poulie en fin de course."},
      {id:"legcurl",   name:"Leg curl (poulie, unilatéral)", tempo:[2,0,1,1], rir:[0.5,0], tip:"Ne cambre pas le bas du dos pour tricher l'amplitude — bassin neutre, pause en contraction max."},
      {id:"molletsDeb",name:"Mollets debout (Smith)", tempo:[2,1,1,1], rir:[0.5,0], tip:"Amplitude complète : étirement franc en bas, contraction pic en haut. Les mollets répondent mieux à l'amplitude qu'à la charge lourde partielle."},
    ]},
  jeudi:   { title:"Pecs + Triceps", sub:"rappel léger", groups:["pecs","triceps"],
    warmup:["<b>Général</b> — 1-2 min mobilité légère (séance de rappel, pas besoin d'un long général)","<b>Articulaire</b> — rotations d'épaules 15x","<b>Activation</b> — pompes légères 2×8, écartés légers 1×12","<b>Potentiation</b> — pas nécessaire ici, l'intensité de la séance reste sous-maximale"],
    stretch:["Pecs cadre de porte, 20s/côté","Triceps au-dessus de la tête, 20s/côté","Respiration diaphragmatique, 2-3 cycles"],
    exercises:[
      {id:"dbbench",   name:"Développé haltères", tempo:[2,0,1,0], rir:[2,1.5], tip:"Amplitude plus profonde qu'à la barre — laisse les haltères descendre sous la poitrine pour l'étirement, sans excès sur l'épaule."},
      {id:"flyUni",    name:"Écarté unilatéral (poulie haute→basse)", tempo:[2,1,1,1], rir:[1,0.5], tip:"Léger angle du coude fixe tout le mouvement — pense à 'embrasser un arbre', pas à pousser."},
      {id:"triUniExt", name:"Extension triceps unilatérale (poulie)", tempo:[2,0,1,1], rir:[1,0.5], tip:"Coude fixe collé au corps, isole vraiment le triceps sans aide de l'épaule."},

const DAY_ORDER = ["lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const DAY_LABEL = {lundi:"Lun",mardi:"Mar",mercredi:"Mer",jeudi:"Jeu",vendredi:"Ven",samedi:"Sam"};
const TOTAL_WEEKS = 6;
const REST_BY_TYPE = {compound:150, isolation:75};
const COMPOUND_IDS = new Set(["decline","inclineSm","squat","goodmorning","hipthrust","dbbench","ohp","tirageUniInc","australienne","tirageSerre","rowUniPenche","rowUniBanc","tirageLarge","dips"]);

/* ---------- STATE ---------- */
const STORAGE_KEY = "frequence_v3";
let state = loadState();
function defaultState(){ return { week:1, logs:{}, prs:{} }; }
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){ return defaultState(); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function logKey(week, day){ return "w"+week+"_"+day; }
function getLog(week, day){
  const k = logKey(week, day);
  if(!state.logs[k]) state.logs[k] = {exercises:{}, date:""};
  return state.logs[k];
}
function phaseOf(week){ return week<=3?1:(week<=5?2:3); }
const PHASE_LABEL = {1:"Accumulation", 2:"Intensification", 3:"Deload · tests"};
const WEEK_INTRO = {
  1:{title:"Semaine 1 — Calibration", text:"Première semaine du bloc Accumulation. L'objectif n'est pas la charge maximale mais l'installation : trouve tes poids de référence sur chaque exercice avec une marge confortable (RIR 2 sur les composés), verrouille la technique et le tempo. Tout ce que tu logges cette semaine sert de base aux 5 suivantes."},
  2:{title:"Semaine 2 — Première progression", text:"Toujours en Accumulation, même RIR cible qu'en S1. Sur les exercices terminés confortablement, la charge suggérée monte (+2,5kg composés, +1kg isolations). Si un mouvement a été dur en S1, reste sur le même poids et vise juste de meilleures reps plutôt que plus de charge."},
  3:{title:"Semaine 3 — Fin d'accumulation", text:"Dernière semaine du bloc. Le volume cumulé des 3 semaines commence à peser — une fatigue modérée est normale, pas un signal d'alarme. Continue de progresser la charge où c'est possible, mais priorise la technique sur la performance brute si les deux entrent en conflit."},
  4:{title:"Semaine 4 — Bascule Intensification", text:"Changement de logique : le RIR cible baisse, tu t'approches plus près de l'échec sur chaque série. La charge continue de monter mais avec une marge de répétitions plus fine. C'est normal que ça devienne plus dur — c'est le but du bloc. Sois strict sur la technique, la fatigue est plus élevée qu'en S1-3."},
  5:{title:"Semaine 5 — Pic d'intensité", text:"Deuxième et dernière semaine d'Intensification, la plus exigeante du programme. RIR proche de 0 sur beaucoup de mouvements — c'est le moment où les records ont le plus de chances de tomber sur les composés. Écoute ta récupération : si le sommeil ou l'appétit décrochent, coupe une série plutôt que de forcer."},
  6:{title:"Semaine 6 — Deload & tests", text:"Semaine de clôture en deux temps. Les premiers jours : volume et charge réduits (-30 à -40%) pour dissiper la fatigue des 5 semaines précédentes. En fin de semaine : teste tes nouveaux maximums sur les mouvements clés pour valider la progression avant de repartir sur un nouveau cycle."},

let activeDay = "lundi";

/* ---------- Program-wide progress ---------- */
function computeProgramProgress(){
  let totalSlots=0, doneSlots=0;
  for(let w=1; w<=TOTAL_WEEKS; w++){
    DAY_ORDER.forEach(d=>{
      const exList = PROGRAM[d].exercises.filter(e=>e.tempo);
      totalSlots += exList.length;
      const log = state.logs[logKey(w,d)];
      if(log) exList.forEach(e=>{ if(log.exercises[e.id] && log.exercises[e.id].sets.some(s=>s.done)) doneSlots++; });
    });
  }
  return {pct: totalSlots ? Math.round(doneSlots/totalSlots*100) : 0, doneSlots, totalSlots};
}
function dayCompletionPct(week, day){
  const exList = PROGRAM[day].exercises.filter(e=>e.tempo);
  if(!exList.length) return 0;
  const log = state.logs[logKey(week,day)];
  if(!log) return 0;
  const done = exList.filter(e=> log.exercises[e.id] && log.exercises[e.id].sets.some(s=>s.done)).length;
  return Math.round(done/exList.length*100);
}
function weekCompletionPct(week){
  let sum=0, n=0;
  DAY_ORDER.forEach(d=>{ if(PROGRAM[d].exercises.some(e=>e.tempo)){ sum += dayCompletionPct(week,d); n++; } });
  return n ? Math.round(sum/n) : 0;
}

/* ---------- Week stepper ---------- */
function renderWeekStepper(){
  const track = document.getElementById("weekTrack");
  track.innerHTML = "";
  for(let w=1; w<=TOTAL_WEEKS; w++){
    const pct = weekCompletionPct(w);
    const dot = document.createElement("div");
    dot.className = "week-dot" + (w===state.week?" current":"") + (pct===100?" full":"");
    dot.innerHTML = "S"+w + (pct>0 ? `<span class="pct">${pct}%</span>` : "");
    dot.onclick = ()=>{ state.week = w; saveState(); renderAll(); };
    track.appendChild(dot);
  }
  document.getElementById("phaseLabel").textContent = "Semaine "+state.week+" / "+TOTAL_WEEKS+" — "+PHASE_LABEL[phaseOf(state.week)];
  const intro = WEEK_INTRO[state.week];
  document.getElementById("weekBrief").innerHTML = intro ? `<div class="wb-title">${intro.title}</div><div class="wb-text">${intro.text}</div>` : "";

  const prog = computeProgramProgress();
  document.getElementById("programBarFill").style.width = prog.pct+"%";
  document.getElementById("programBarText").textContent = prog.pct+"% du programme (6 semaines)";
  let streak = 0;
  outer: for(let w=TOTAL_WEEKS; w>=1; w--){
    for(let di=DAY_ORDER.length-1; di>=0; di--){
      const d = DAY_ORDER[di];
      if(!PROGRAM[d].exercises.some(e=>e.tempo)) continue;
      if(dayCompletionPct(w,d)===100) streak++;
      else if(state.logs[logKey(w,d)]) break outer;
    }
  }
  document.getElementById("programStreak").textContent = streak>0 ? "🔥 "+streak+" séance"+(streak>1?"s":"") : "";
}
document.getElementById("weekPrev").onclick = ()=>{ if(state.week>1){ state.week--; saveState(); renderAll(); } };
document.getElementById("weekNext").onclick = ()=>{ if(state.week<TOTAL_WEEKS){ state.week++; saveState(); renderAll(); } };

/* ---------- Day nav ---------- */
const dayNav = document.getElementById("dayNav");
DAY_ORDER.forEach(d=>{
  const b = document.createElement("button");
  b.className = "day-btn";
  b.innerHTML = DAY_LABEL[d] + '<span class="grp">'+PROGRAM[d].groups.join("·")+'</span>';
  b.dataset.day = d;
  b.onclick = ()=>{ activeDay = d; renderDayNav(); renderExercises(); };
  dayNav.appendChild(b);
});
function dayIsComplete(day){ return dayCompletionPct(state.week, day) === 100; }
function renderDayNav(){
  [...dayNav.children].forEach(b=>{
    b.classList.toggle("active", b.dataset.day===activeDay);
    b.classList.toggle("complete", dayIsComplete(b.dataset.day));
  });
  document.getElementById("dayTitle").textContent = PROGRAM[activeDay].title + (PROGRAM[activeDay].sub?" · "+PROGRAM[activeDay].sub:"");
}

/* ---------- Progression lookup ---------- */
function bestSetOf(week, day, exId){
  const log = state.logs[logKey(week, day)];
  if(!log || !log.exercises[exId]) return null;
  const done = log.exercises[exId].sets.filter(s=>s.done && s.kg);
  if(!done.length) return null;
  return done.reduce((a,b)=> (parseFloat(b.kg)||0) > (parseFloat(a.kg)||0) ? b : a);
}
function previousLoggedWeek(day, exId){
  for(let w=state.week-1; w>=1; w--){
    const s = bestSetOf(w, day, exId);
    if(s) return {week:w, set:s};
  }
  return null;
}
function suggestedSets(day, exId){
  const prev = previousLoggedWeek(day, exId);
  if(!prev) return [{kg:"",reps:"",done:false},{kg:"",reps:"",done:false},{kg:"",reps:"",done:false}];
  const increment = COMPOUND_IDS.has(exId) ? 2.5 : 1;
  const suggestedKg = (parseFloat(prev.set.kg) + increment);
  const kgStr = (Math.round(suggestedKg*2)/2).toString();
  const repsStr = prev.set.reps || "";
  return [
    {kg:kgStr, reps:repsStr, done:false, suggested:true},
    {kg:kgStr, reps:repsStr, done:false, suggested:true},
    {kg:kgStr, reps:repsStr, done:false, suggested:true},
  ];
}

/* ---------- Warm-up / stretch blocks ---------- */
function renderFlowCard(kind, items, icon, label){

  wrap.className = "flow-card " + kind;
  wrap.innerHTML = `
    <div class="flow-head">

    const list = wrap.querySelector(".flow-list");
    const sub = wrap.querySelector(".flow-sub");
    list.classList.toggle("show");
    sub.textContent = items.length+" pts " + (list.classList.contains("show") ? "▴" : "▾");
  };
  return wrap;
}

/* ---------- Exercises ---------- */
function tempoStripHTML(tempo){
  const [ecc,pauseB,con,pauseH] = tempo;
  const seg = (cls,v)=> v>0 ? `<div class="tempo-seg ${cls}" style="flex:${v}"></div>` : "";
  return `<div class="tempo-strip">${seg("ecc",ecc)}${seg("pause",pauseB)}${seg("con",con)}${seg("pause",pauseH)}</div>
  <div class="tempo-legend"><span>↓${ecc}s</span><span>⏸${pauseB}s</span><span>↑${con}s</span><span>⏸${pauseH}s</span></div>`;
}
function rirLabel(rir){
  if(!rir) return null;
  const idx = phaseOf(state.week)===1?0:1;
  const val = idx===0?rir[0]:rir[1];
  return "RIR "+(val===0.5?"0-1":val);
}
function estimate1RM(kg,reps){ return kg*(1+reps/30); }

function renderExercises(){
  renderDayNav();
  const day = PROGRAM[activeDay];

  document.getElementById("warmupSlot").innerHTML = "";
  document.getElementById("warmupSlot").appendChild(renderFlowCard("warmup", day.warmup, "🔥", "Échauffement"));
  document.getElementById("stretchSlot").innerHTML = "";
  document.getElementById("stretchSlot").appendChild(renderFlowCard("stretch", day.stretch, "🧘", "Étirements de fin"));

  const list = document.getElementById("exerciseList");
  list.innerHTML = "";
  const log = getLog(state.week, activeDay);
  let doneCount=0, totalCount=0;

  day.exercises.forEach((ex,i)=>{
    if(!log.exercises[ex.id]) log.exercises[ex.id] = {sets: ex.tempo ? suggestedSets(activeDay, ex.id) : [{kg:"",reps:"",done:false},{kg:"",reps:"",done:false},{kg:"",reps:"",done:false}]};
    const exLog = log.exercises[ex.id];
    totalCount++;
    if(exLog.sets.some(s=>s.done)) doneCount++;

    const prev = ex.tempo ? previousLoggedWeek(activeDay, ex.id) : null;
    const pr = state.prs[ex.id];

    const card = document.createElement("div");
    card.className = "exercise-card";
    card.innerHTML = `
      <div class="ex-head">
        <div class="ex-name"><span class="ex-idx">${i+1}</span>${ex.name}</div>
        ${pr?`<span class="pr-badge">PR ${pr.kg}×${pr.reps}</span>`:""}
      </div>
      ${prev ? `<div class="progress-line" id="prog-${ex.id}"></div>` : (ex.tempo ? `<div class="progress-line"><span class="progress-text">Première fois cette semaine — pas de comparaison</span></div>` : "")}
      <div class="ex-meta">
        ${ex.tempo ? `<span class="meta-chip rir">${rirLabel(ex.rir)}</span><button class="tempo-toggle" data-ex="${ex.id}">tempo ▾</button>` : `<span class="meta-chip">isométrique</span>`}
        ${ex.tip ? `<button class="tip-toggle" data-ex="${ex.id}">💡 conseil ▾</button>` : ``}
      </div>
      ${ex.tempo ? `<div class="tempo-detail" id="tempo-${ex.id}">${tempoStripHTML(ex.tempo)}</div>` : ``}
      ${ex.tip ? `<div class="tip-detail" id="tip-${ex.id}">${ex.tip}</div>` : ``}
      <div class="sets" data-ex="${ex.id}"></div>
      <div class="set-actions">
        <button class="mini-btn add-set">+ série</button>
        ${ex.tempo && COMPOUND_IDS.has(ex.id) ? `<button class="mini-btn rest-btn" data-rest="compound">Repos 2:30</button>` : ex.tempo ? `<button class="mini-btn rest-btn" data-rest="isolation">Repos 1:15</button>` : ``}
      </div>
    `;
    list.appendChild(card);

    if(prev){
      const pEl = card.querySelector(`#prog-${ex.id}`);
      const prevKg = parseFloat(prev.set.kg);
      const curBest = bestSetOf(state.week, activeDay, ex.id);
      const curKg = curBest ? parseFloat(curBest.kg) : null;
      let arrow="flat", diffTxt="pas encore loggé cette semaine";
      if(curKg!==null){
        if(curKg>prevKg){ arrow="up"; diffTxt = `+${(curKg-prevKg).toFixed(1)}kg vs S${prev.week}`; }
        else if(curKg<prevKg){ arrow="down"; diffTxt = `${(curKg-prevKg).toFixed(1)}kg vs S${prev.week}`; }
        else { diffTxt = `= vs S${prev.week}`; }
      }
      const arrowChar = arrow==="up"?"↑":arrow==="down"?"↓":"→";
      pEl.innerHTML = `<span class="arrow ${arrow}">${arrowChar}</span><span class="progress-text">S${prev.week}: <b>${prev.set.kg}kg×${prev.set.reps}</b> — ${diffTxt}</span>`;
    }

    const tempoBtn = card.querySelector(".tempo-toggle");
    if(tempoBtn) tempoBtn.onclick = ()=>{
      const detail = card.querySelector(`#tempo-${ex.id}`);
      detail.classList.toggle("show");
      tempoBtn.textContent = detail.classList.contains("show") ? "tempo ▴" : "tempo ▾";
    };
    const tipBtn = card.querySelector(".tip-toggle");
    if(tipBtn) tipBtn.onclick = ()=>{
      const detail = card.querySelector(`#tip-${ex.id}`);
      detail.classList.toggle("show");
      tipBtn.textContent = (detail.classList.contains("show") ? "💡 conseil ▴" : "💡 conseil ▾");
    };

    const setsWrap = card.querySelector(".sets");
    function renderSets(){
      setsWrap.innerHTML = "";
      exLog.sets.forEach((s,si)=>{
        const row = document.createElement("div");
        row.className = "set-row";
        row.innerHTML = `
          <div class="set-num mono">${si+1}</div>
          <input type="number" inputmode="decimal" placeholder="kg" value="${s.kg}" class="${s.suggested?'is-suggested':''}">
          <input type="number" inputmode="numeric" placeholder="reps" value="${s.reps}" class="${s.suggested?'is-suggested':''}">
          <button class="done-toggle ${s.done?'on':''}">${s.done?'✓':''}</button>
        `;
        const [_, kgInput, repsInput, doneBtn] = row.children;
        kgInput.oninput = ()=>{ s.kg = kgInput.value; s.suggested=false; kgInput.classList.remove('is-suggested'); saveState(); };
        repsInput.oninput = ()=>{ s.reps = repsInput.value; s.suggested=false; repsInput.classList.remove('is-suggested'); saveState(); };
        doneBtn.onclick = ()=>{
          s.done = !s.done;
          if(s.done && s.kg && s.reps) checkPR(ex.id, parseFloat(s.kg), parseFloat(s.reps));
          log.date = todayISO();
          saveState();
          renderExercises();
          renderWeekStepper();
        };
        setsWrap.appendChild(row);
      });
    }
    renderSets();
    card.querySelector(".add-set").onclick = ()=>{ exLog.sets.push({kg:"",reps:"",done:false}); saveState(); renderSets(); };
    const restBtn = card.querySelector("[data-rest]");
    if(restBtn) restBtn.onclick = ()=> startTimer(restBtn.dataset.rest, ex.name);
  });

  document.getElementById("dayProgress").textContent = doneCount+"/"+totalCount+" exercices";
  document.getElementById("completeBanner").classList.toggle("show", totalCount>0 && doneCount===totalCount);
}

function checkPR(exId, kg, reps){
  const est = estimate1RM(kg,reps);
  const existing = state.prs[exId];
  if(!existing || est > estimate1RM(existing.kg, existing.reps)){
    state.prs[exId] = {kg, reps, date: todayISO()};
    saveState();
  }
}

/* ---------- Timer ---------- */
let timerInterval = null;
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.18,0.36].forEach((delay,i)=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = "sine";
      o.frequency.value = i<2 ? 880 : 1175;
      g.gain.value = 0.001;
      const t = ctx.currentTime + delay;
      g.gain.exponentialRampToValueAtTime(0.18, t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
      o.start(t); o.stop(t+0.16);
    });
  }catch(e){}
}
function startTimer(type, label){
  const seconds = REST_BY_TYPE[type] ?? 90;
  let remaining = seconds;
  const overlay = document.getElementById("timerOverlay");
  document.getElementById("timerLabel").textContent = "Repos — " + label;
  overlay.classList.add("show");
  clearInterval(timerInterval);
  const numEl = document.getElementById("timerNum");
  function tick(){
    const m = String(Math.floor(remaining/60)).padStart(2,"0");
    const s = String(remaining%60).padStart(2,"0");
    numEl.textContent = m+":"+s;
    if(remaining<=0){ clearInterval(timerInterval); if(navigator.vibrate) navigator.vibrate([150,80,150]); beep(); return; }
    remaining--;
  }
  tick();
  timerInterval = setInterval(tick,1000);
}
document.getElementById("timerClose").onclick = ()=>{
  document.getElementById("timerOverlay").classList.remove("show");
  clearInterval(timerInterval);
};

/* ---------- Wake lock: keep screen on during the session ---------- */
let wakeLock = null;
async function requestWakeLock(){
  try{
    if("wakeLock" in navigator){ wakeLock = await navigator.wakeLock.request("screen"); }
  }catch(e){ /* not supported or denied — fail silently */ }
}
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") requestWakeLock(); });
document.addEventListener("click", requestWakeLock, {once:true});
requestWakeLock();

/* ---------- Settings modal ---------- */
document.getElementById("gearBtn").onclick = ()=> document.getElementById("modalOverlay").classList.add("show");
document.getElementById("modalClose").onclick = ()=> document.getElementById("modalOverlay").classList.remove("show");
document.getElementById("exportBtn").onclick = ()=>{
  const ta = document.getElementById("importArea");
  ta.value = JSON.stringify(state, null, 2);
  ta.select();
  try{ document.execCommand("copy"); }catch(e){}
};
document.getElementById("importBtn").onclick = ()=>{
  try{
    const parsed = JSON.parse(document.getElementById("importArea").value);
    state = Object.assign(defaultState(), parsed);
    saveState(); renderAll();
    alert("Importé.");
  }catch(e){ alert("JSON invalide."); }
};
document.getElementById("resetBtn").onclick = ()=>{
  if(confirm("Réinitialiser toutes les données ?")){ state = defaultState(); saveState(); renderAll(); }
};

/* ---------- init ---------- */
function renderAll(){
  renderWeekStepper();
  renderDayNav();
  renderExercises();
}
renderAll();

})();
</script>
</body>
</html>
