<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fréquence Pro</title>
<style>
  :root{
    --bg:#12141A; --surface:#1B1E27; --surface2:#232733; --line:#2C303C;
    --text:#EDEEF2; --muted:#8A8FA3; --muted2:#5C6072;
    --signal:#E8A33D; --pulse:#4FD8D0; --danger:#E85D4A; --good:#6FCF97;
    --warm:#F0A868; --cool:#5FB8D4; --radius:10px;
  }
  body.light{
    --bg:#F5F5F7; --surface:#FFFFFF; --surface2:#F0F0F5; --line:#E0E0E6;
    --text:#1A1A2E; --muted:#6B7280; --muted2:#9CA3AF;
    --signal:#D97706; --pulse:#0D9488; --danger:#DC2626; --good:#059669;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,sans-serif; -webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono','SF Mono',Menlo,monospace;}
  button{font-family:inherit;}
  h1,h2,h3{margin:0; font-weight:700; letter-spacing:-0.01em;}
  ::selection{background:var(--signal); color:#12141A;}
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{ outline:2px solid var(--pulse); outline-offset:2px; }

  #app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  header.top{
    position:sticky; top:0; z-index:20; background:rgba(18,20,26,0.95); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); padding:12px 16px 0;
  }
  body.light header.top{ background:rgba(245,245,247,0.95); }
  .brand-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .brand{font-size:18px; font-weight:800; letter-spacing:-0.02em;}
  .gear-btn{background:none; border:none; color:var(--muted); font-size:18px; padding:4px; cursor:pointer;}

  .program-bar-wrap{margin-bottom:10px;}
  .program-bar-track{height:6px; border-radius:4px; background:var(--surface2); overflow:hidden;}
  .program-bar-fill{height:100%; background:linear-gradient(90deg, var(--pulse), var(--signal)); border-radius:4px; transition:width .3s;}
  .program-bar-label{display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-top:4px;}

  .week-stepper{display:flex; align-items:center; gap:10px; padding-bottom:10px;}
  .week-arrow{width:32px; height:32px; border-radius:8px; background:var(--surface); border:1px solid var(--line); color:var(--text); font-size:15px; cursor:pointer; flex-shrink:0;}
  .week-track{flex:1; display:flex; gap:4px;}
  .week-dot{flex:1; height:34px; border-radius:6px; background:var(--surface); border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--muted2); cursor:pointer; position:relative;}
  .week-dot.current{background:var(--text); color:var(--bg); border-color:var(--text); font-weight:700;}
  .week-dot .pct{font-size:8px; opacity:0.7; margin-top:1px;}
  .week-dot.full{border-color:var(--good);}
  .week-dot.full::after{content:"✓"; position:absolute; top:-6px; right:-4px; width:14px; height:14px; border-radius:50%; background:var(--good); color:#0c1a12; font-size:8.5px; display:flex; align-items:center; justify-content:center;}
  .phase-label{text-align:center; font-size:10px; color:var(--signal); letter-spacing:0.06em; text-transform:uppercase; padding-bottom:10px; font-family:'IBM Plex Mono',monospace;}

  nav.days{display:flex; gap:6px; overflow-x:auto; padding:0 16px 12px; scrollbar-width:none;}
  nav.days::-webkit-scrollbar{display:none;}
  .day-btn{flex-shrink:0; background:var(--surface); border:1px solid var(--line); color:var(--muted); padding:8px 13px; border-radius:20px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap; position:relative;}
  .day-btn.active{background:var(--text); color:var(--bg); border-color:var(--text);}
  .day-btn .grp{display:block; font-size:9px; font-weight:500; opacity:0.65; margin-top:1px;}
  .day-btn.complete::before{content:"✓"; position:absolute; top:-5px; right:-4px; width:15px; height:15px; border-radius:50%; background:var(--good); color:#0c1a12; font-size:9px; display:flex; align-items:center; justify-content:center;}

  main{flex:1; padding:14px 16px 40px;}

  .day-header{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;}
  .day-header h2{font-size:16px;}
  .day-progress{font-size:11.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}

  .week-brief{background:#B8E8E2; border:1px solid #7DCFC5; border-left:4px solid #2E9C8F; border-radius:0 var(--radius) var(--radius) 0; padding:13px 14px; margin-bottom:16px;}
  .week-brief .wb-title{font-size:13px; font-weight:800; color:#0A2E28; letter-spacing:0.02em; margin-bottom:6px;}
  .week-brief .wb-text{font-size:13.5px; font-weight:500; line-height:1.6; color:#000000;}

  .complete-banner{display:none; background:linear-gradient(90deg, rgba(111,207,151,0.15), rgba(79,216,208,0.1)); border:1px solid rgba(111,207,151,0.35); color:var(--good); font-size:12.5px; font-weight:600; padding:10px 12px; border-radius:9px; margin-bottom:12px; text-align:center;}
  .complete-banner.show{display:block;}

  .flow-card{border-radius:var(--radius); padding:13px 14px; margin-bottom:12px; border:1px solid var(--line);}
  .flow-card.warmup{background:#F0C89A; border-color:#E0A868;}
  .flow-card.stretch{background:#BCE4EC; border-color:#8FCBD8;}
  .flow-head{display:flex; align-items:center; gap:7px; cursor:pointer;}
  .flow-icon{font-size:14px;}
  .flow-title{font-size:13.5px; font-weight:700; letter-spacing:0.01em; color:#1A1408;}
  .flow-card.stretch .flow-title{color:#0D2226;}
  .flow-sub{font-size:10.5px; color:#4A3E28; margin-left:auto; font-family:'IBM Plex Mono',monospace;}
  .flow-card.stretch .flow-sub{color:#2C4448;}
  .flow-list{display:none; margin:12px 0 0; padding:0; list-style:none;}
  .flow-list.show{display:block;}
  .flow-list li{font-size:14.5px; font-weight:600; color:#000000; padding:7px 0 7px 20px; position:relative; line-height:1.6; letter-spacing:0.01em;}
  .flow-list li::before{content:"•"; position:absolute; left:2px; top:7px; color:#5A4A2E; font-size:14px;}
  .flow-card.stretch .flow-list li::before{color:#2C4448;}
  .flow-list li b{font-weight:800;}

  .exercise-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:10px; transition:opacity .2s, border-color .2s;}
  .exercise-card.ex-done{opacity:0.55; border-color:var(--good);}
  .kg-wrap{display:flex; align-items:center; gap:4px;}
  .kg-wrap input{flex:1; min-width:0;}
  .step-btn{width:26px; height:36px; flex-shrink:0; background:var(--surface2); border:1px solid var(--line); color:var(--text); border-radius:6px; font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none;}
  .week-complete-banner{display:flex; align-items:center; justify-content:space-between; gap:10px; background:rgba(111,207,151,0.1); border:1px solid rgba(111,207,151,0.35); border-radius:9px; padding:10px 12px; margin-bottom:14px;}
  .week-complete-banner span{font-size:12.5px; color:var(--good); font-weight:600;}
  .week-complete-banner button{background:var(--good); border:none; color:#0c1a12; font-size:12px; font-weight:700; padding:8px 12px; border-radius:7px; cursor:pointer; flex-shrink:0;}
  #exerciseList{touch-action:pan-y;}
  .ex-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .ex-name{font-size:14.5px; font-weight:700; line-height:1.3;}
  .ex-idx{color:var(--muted2); font-family:'IBM Plex Mono',monospace; font-size:12px; margin-right:6px;}

  .progress-line{display:flex; align-items:center; gap:6px; margin-top:8px; padding:7px 9px; background:var(--surface2); border-radius:7px;}
  .progress-line .arrow{font-size:13px; font-weight:800;}
  .progress-line .arrow.up{color:var(--good);}
  .progress-line .arrow.down{color:var(--danger);}
  .progress-line .arrow.flat{color:var(--muted2);}
  .progress-text{font-size:11.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}
  .progress-text b{color:var(--text); font-weight:700;}

  .ex-meta{display:flex; gap:8px; margin-top:9px; flex-wrap:wrap; align-items:center;}
  .meta-chip{font-size:10.5px; font-family:'IBM Plex Mono',monospace; color:var(--muted); background:var(--surface2); padding:3px 7px; border-radius:5px;}
  .meta-chip.rir{color:var(--signal); background:rgba(232,163,61,0.1);}
  .tempo-toggle,.tip-toggle{background:none; border:none; color:var(--pulse); font-size:10.5px; font-family:'IBM Plex Mono',monospace; cursor:pointer; padding:3px 0;}
  .tip-toggle{color:var(--signal);}
  .tip-detail{display:none; margin-top:9px; font-size:13px; line-height:1.5; color:var(--text); background:var(--surface2); border-left:2px solid var(--signal); padding:9px 11px; border-radius:0 7px 7px 0;}
  .tip-detail.show{display:block;}
  .tempo-detail{display:none; margin-top:8px;}
  .tempo-detail.show{display:block;}
  .tempo-strip{display:flex; border-radius:6px; overflow:hidden; height:5px;}
  .tempo-seg{flex:1;}
  .tempo-seg.ecc{background:var(--pulse);}
  .tempo-seg.pause{background:var(--muted2);}
  .tempo-seg.con{background:var(--signal);}
  .tempo-legend{display:flex; gap:12px; margin-top:5px; font-size:9.5px; color:var(--muted2); font-family:'IBM Plex Mono',monospace;}

  .sets{margin-top:12px; display:flex; flex-direction:column; gap:6px;}
  .set-row{display:grid; grid-template-columns:22px 1fr 1fr 40px 20px; gap:8px; align-items:center;}
  .set-row.uni{grid-template-columns:20px 1fr 1fr 0.9fr 40px 20px;}
  .sym-chip{margin-top:8px;}
  .sym-badge{font-size:10.5px; font-family:'IBM Plex Mono',monospace; padding:3px 8px; border-radius:5px; display:inline-block;}
  .sym-badge.ok{color:var(--good); background:rgba(111,207,151,0.12);}
  .sym-badge.warn{color:var(--signal); background:rgba(232,163,61,0.12);}
  .sym-badge.bad{color:var(--danger); background:rgba(232,93,74,0.12);}
  .set-num{font-size:11px; color:var(--muted2); font-family:'IBM Plex Mono',monospace;}
  .set-row input[type=number]{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:8px; font-size:14px; font-family:'IBM Plex Mono',monospace;}
  .set-row input::placeholder{color:var(--muted2);}
  .set-row input.is-suggested{color:var(--signal); border-color:rgba(232,163,61,0.4); background:rgba(232,163,61,0.06);}
  .done-toggle{width:38px; height:38px; border-radius:8px; border:1px solid var(--line); background:var(--surface2); color:var(--muted); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .done-toggle.on{background:var(--good); border-color:var(--good); color:#0c1a12;}
  .set-actions{display:flex; gap:8px; margin-top:9px;}
  .mini-btn{background:none; border:1px dashed var(--line); color:var(--muted); font-size:11.5px; padding:6px 10px; border-radius:6px; cursor:pointer;}
  .rest-btn{background:var(--surface2); border:1px solid var(--line); color:var(--pulse);}
  .pr-badge{font-size:10px; color:#0c1a12; background:var(--signal); padding:2px 6px; border-radius:4px; font-weight:700; margin-left:6px; white-space:nowrap;}

  .delete-set{background:none; border:none; color:var(--danger); cursor:pointer; font-size:16px; padding:0; width:20px; text-align:center;}
  .session-summary{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-top:16px; display:none;}
  .session-summary.show{display:block;}
  .chart-container{width:100%; height:180px; margin:10px 0; background:var(--surface2); border-radius:8px; overflow:hidden;}

  .theme-toggle{background:none; border:none; font-size:18px; cursor:pointer; padding:4px; margin-left:8px;}
  .modal-overlay{position:fixed; inset:0; background:rgba(12,13,17,0.85); backdrop-filter:blur(4px); z-index:60; display:none; align-items:flex-end; justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal-sheet{width:100%; max-width:520px; background:var(--surface); border-radius:16px 16px 0 0; padding:18px 16px 28px; border:1px solid var(--line); border-bottom:none; max-height:85vh; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .modal-sheet h3{font-size:15px; margin-bottom:12px;}
  textarea{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:10px; font-family:'IBM Plex Mono',monospace; font-size:11px; min-height:90px;}
  .io-row{display:flex; gap:8px; margin-top:8px;}
  .io-btn{flex:1; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:11px; border-radius:8px; font-size:12.5px; cursor:pointer;}
  .modal-close{width:100%; margin-top:14px; background:none; border:none; color:var(--muted); padding:8px; font-size:13px;}
  .field-row{display:flex; gap:8px; margin-bottom:10px;}
  .field-row label{display:block; font-size:11px; color:var(--muted); margin-bottom:4px;}
  .field{flex:1;}
  .field input, .field-row input{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:9px; font-size:14px; box-sizing:border-box;}

  .timer-overlay{position:fixed; inset:0; background:rgba(12,13,17,0.92); backdrop-filter:blur(6px); z-index:50; display:none; align-items:center; justify-content:center; flex-direction:column;}
  .timer-overlay.show{display:flex;}
  .timer-num{font-family:'IBM Plex Mono',monospace; font-size:64px; font-weight:700; color:var(--pulse);}
  .timer-label{color:var(--muted); font-size:13px; margin-top:6px;}
  .timer-close{margin-top:26px; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:10px 22px; border-radius:20px; cursor:pointer;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
</style>
</head>
<body class="dark">
<div id="app">
  <header class="top">
    <div class="brand-row">
      <div class="brand">Fréquence Pro</div>
      <div style="display:flex; align-items:center;">
        <button class="theme-toggle" id="themeToggle" aria-label="Changer le thème">🌓</button>
        <button class="gear-btn" id="gearBtn" aria-label="Réglages">⚙</button>
      </div>
    </div>
    <div class="program-bar-wrap">
      <div class="program-bar-track"><div class="program-bar-fill" id="programBarFill" style="width:0%"></div></div>
      <div class="program-bar-label"><span id="programBarText">0% du programme</span><span id="programStreak"></span></div>
    </div>
    <div class="week-stepper">
      <button class="week-arrow" id="weekPrev">‹</button>
      <div class="week-track" id="weekTrack"></div>
      <button class="week-arrow" id="weekNext">›</button>
    </div>
    <div class="phase-label" id="phaseLabel"></div>
    <nav class="days" id="dayNav"></nav>
  </header>

  <main>
    <div class="week-complete-banner" id="weekCompleteBanner" style="display:none;">
      <span id="weekCompleteText"></span>
      <button id="weekCompleteBtn">Semaine suivante →</button>
    </div>
    <div class="week-brief" id="weekBrief"></div>
    <div class="day-header">
      <h2 id="dayTitle"></h2>
      <div class="day-progress mono" id="dayProgress"></div>
    </div>
    <div class="complete-banner" id="completeBanner">Séance terminée 💪 Bien joué.</div>
    <div id="warmupSlot"></div>
    <div id="exerciseList"></div>
    <div id="stretchSlot"></div>
    <div id="sessionSummary" class="session-summary"></div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <h3>Mesures physiques</h3>
    <div class="field-row">
      <div class="field"><label>Épaules (cm)</label><input type="number" step="0.5" id="mShoulders"></div>
      <div class="field"><label>Taille (cm)</label><input type="number" step="0.5" id="mWaist"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Pecs (cm)</label><input type="number" step="0.5" id="mPecs"></div>
      <div class="field"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Bras gauche (cm)</label><input type="number" step="0.5" id="mArmL"></div>
      <div class="field"><label>Bras droit (cm)</label><input type="number" step="0.5" id="mArmR"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Cuisse gauche (cm)</label><input type="number" step="0.5" id="mThighL"></div>
      <div class="field"><label>Cuisse droite (cm)</label><input type="number" step="0.5" id="mThighR"></div>
    </div>

    <h3 style="margin-top:18px; font-size:13px;">Taux de graisse — méthode 4 plis (Durnin-Womersley)</h3>
    <div class="field-row">
      <div class="field"><label>Pli biceps (mm)</label><input type="number" step="0.1" id="skBiceps"></div>
      <div class="field"><label>Pli triceps (mm)</label><input type="number" step="0.1" id="skTriceps"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Pli sous-scapulaire (mm)</label><input type="number" step="0.1" id="skSubscap"></div>
      <div class="field"><label>Pli supra-iliaque (mm)</label><input type="number" step="0.1" id="skSuprailiac"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Âge</label><input type="number" step="1" id="mAge"></div>
      <div class="field" style="align-self:flex-end;"><button class="mini-btn" style="padding:9px 14px; width:100%;" id="mAdd">Ajouter la mesure</button></div>
    </div>
    <div id="mHistory" class="mono" style="font-size:12px; color:var(--muted); margin-top:4px; max-height:160px; overflow-y:auto;"></div>
    <div class="chart-container"><canvas id="measChart" width="300" height="150"></canvas></div>
    <h3 style="margin-top:20px;">Données</h3>
    <button class="io-btn" id="exportBtn" style="width:100%;">Copier les données (JSON)</button>
    <div style="margin-top:12px;">
      <textarea id="importArea" placeholder="Colle un export JSON ici pour importer..."></textarea>
      <div class="io-row">
        <button class="io-btn" id="importBtn">Importer</button>
        <button class="io-btn" id="resetBtn" style="color:var(--danger);">Réinitialiser</button>
      </div>
    </div>
    <button class="modal-close" id="modalClose">Fermer</button>
  </div>
</div>

<div class="timer-overlay" id="timerOverlay">
  <div class="timer-num mono" id="timerNum">02:00</div>
  <div class="timer-label" id="timerLabel">Repos</div>
  <button class="timer-close" id="timerClose">Fermer</button>
</div>

<script>
(function(){
"use strict";

/* ---------- PROGRAM DEFINITION ---------- */
const PROGRAM = {
  lundi:   { title:"Pecs + Triceps", sub:"dominant", groups:["pecs","triceps"],
    warmup:["<b>Général</b> — 2-3 min vélo/rameur léger ou 30 jumping jacks","<b>Articulaire</b> — rotations d'épaules 20x avant/arrière, cercles de poignets 15x","<b>Activation</b> — écartés légers au poids du corps 15 reps + pompes à vide 2×10","<b>Potentiation</b> — barre à vide sur le banc décliné 1×10, puis 1 série à 50% de la charge de travail"],
    stretch:["Pecs en appui sur cadre de porte, 30s/côté","Triceps bras au-dessus de la tête, 30s/côté","Croisé de l'épaule avant, 20s/côté","Respiration diaphragmatique, 3-4 cycles"],
    exercises:[
      {id:"decline",  name:"Développé décliné (barre libre)", tempo:[2,0,1,0], rir:[2,1], tip:"Coudes à ~45° du buste, omoplates serrées. Descends jusqu'au contact léger.", sets:4, reps:["8-10","5-6"]},
      {id:"inclineSm",name:"Incliné (Smith)", tempo:[2,1,1,0], rir:[1,0.5], tip:"Banc à 30-45°, pas plus.", sets:4, reps:["10-12","6-8"]},
      {id:"dips",     name:"Dips lestés", tempo:[2,0,1,0], rir:[1,0.5], tip:"Buste penché en avant, coudes qui s'écartent légèrement.", sets:3, reps:["8-12","6-8"]},
      {id:"pushup",   name:"Pompes lestées", tempo:[2,0,1,0], rir:[1,0], tip:"Corps aligné tête-talons, amplitude complète.", sets:3, reps:["10-15","8-10"]},
      {id:"triOhInc", name:"Triceps au-dessus tête (banc incliné, barre spéciale)", tempo:[3,1,1,0], rir:[1,0], tip:"Coudes fixes proches de la tête.", sets:3, reps:["10-12","8-10"]},
      {id:"triRopeExt",name:"Triceps corde (rotation externe)", tempo:[2,1,1,1], rir:[0.5,0], tip:"Coudes collés au corps, écarte les mains en fin de mouvement.", sets:3, reps:["12-15","10-12"]},
    ]},
  mardi:   { title:"Dos + Biceps", sub:"dominant", groups:["dos","biceps"],
    warmup:["<b>Général</b> — 2-3 min rameur léger","<b>Articulaire</b> — rotations scapulaires 20x, cat-cow 10 reps lentes","<b>Activation</b> — tirage vertical à la poulie à vide 1×15","<b>Potentiation</b> — 1 série à 50-60% de la charge de travail"],

/* ---------- Program-wide progress ---------- */
function computeProgramProgress(){
  let totalSlots=0, doneSlots=0;
  for(let w=1; w<=TOTAL_WEEKS; w++){
    DAY_ORDER.forEach(d=>{
      const exList = PROGRAM[d].exercises.filter(e=>e.tempo);
      totalSlots += exList.length;
      const log = state.logs[logKey(w,d)];
      if(log) exList.forEach(e=>{ if(log.exercises[e.id] && log.exercises[e.id].sets.some(s=>s.done)) doneSlots++; });
    });
  }
  return {pct: totalSlots ? Math.round(doneSlots/totalSlots*100) : 0, doneSlots, totalSlots};
}
function dayCompletionPct(week, day){
  const exList = PROGRAM[day].exercises.filter(e=>e.tempo);
  if(!exList.length) return 0;
  const log = state.logs[logKey(week,day)];
  if(!log) return 0;
  const done = exList.filter(e=> log.exercises[e.id] && log.exercises[e.id].sets.some(s=>s.done)).length;
  return Math.round(done/exList.length*100);
}
function weekCompletionPct(week){
  let sum=0, n=0;
  DAY_ORDER.forEach(d=>{ if(PROGRAM[d].exercises.some(e=>e.tempo)){ sum += dayCompletionPct(week,d); n++; } });
  return n ? Math.round(sum/n) : 0;
}

/* ---------- Week stepper ---------- */
function renderWeekStepper(){
  const track = document.getElementById("weekTrack");
  track.innerHTML = "";
  for(let w=1; w<=TOTAL_WEEKS; w++){
    const pct = weekCompletionPct(w);
    const dot = document.createElement("div");
    dot.className = "week-dot" + (w===state.week?" current":"") + (pct===100?" full":"");
    dot.innerHTML = "S"+w + (pct>0 ? `<span class="pct">${pct}%</span>` : "");
    dot.onclick = ()=>{ state.week = w; saveState(); renderAll(); };
    track.appendChild(dot);
  }
  document.getElementById("phaseLabel").textContent = "Semaine "+state.week+" / "+TOTAL_WEEKS+" — "+PHASE_LABEL[phaseOf(state.week)];
  const intro = WEEK_INTRO[state.week];
  document.getElementById("weekBrief").innerHTML = intro ? `<div class="wb-title">${intro.title}</div><div class="wb-text">${intro.text}</div>` : "";

  const prog = computeProgramProgress();
  document.getElementById("programBarFill").style.width = prog.pct+"%";
  document.getElementById("programBarText").textContent = prog.pct+"% du programme (6 semaines)";

  const wBanner = document.getElementById("weekCompleteBanner");
  if(weekCompletionPct(state.week)===100 && state.week<TOTAL_WEEKS){
    wBanner.style.display = "flex";
    document.getElementById("weekCompleteText").textContent = "Semaine "+state.week+" terminée 💪";
  } else {
    wBanner.style.display = "none";
  }
  // Streak corrigé
  let streak = 0;
  for(let w=TOTAL_WEEKS; w>=1; w--){
    for(let di=DAY_ORDER.length-1; di>=0; di--){
      const d = DAY_ORDER[di];
      if(!PROGRAM[d].exercises.some(e=>e.tempo)) continue;
      if(dayCompletionPct(w,d)===100) streak++;
      else break;
    }
    if(streak > 0 && dayCompletionPct(w, DAY_ORDER[0]) !== 100) break; // arrêt si semaine incomplète
  }
  document.getElementById("programStreak").textContent = streak>0 ? "🔥 "+streak+" séance"+(streak>1?"s":"") : "";
}

    if(Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)*1.5) return;

/* ---------- Progression lookup ---------- */
function repKg(s){
  if(s.kgL!==undefined) {
    const l = parseFloat(s.kgL)||0, r = parseFloat(s.kgR)||0;
    if(!l && !r) return 0;
    if(!l) return r; if(!r) return l;
    return (l+r)/2;
  }
  return parseFloat(s.kg)||0;
}
function bestSetOf(week, day, exId){
  const log = state.logs[logKey(week, day)];
  if(!log || !log.exercises[exId]) return null;
  const done = log.exercises[exId].sets.filter(s=>s.done && repKg(s));
  if(!done.length) return null;
  return done.reduce((a,b)=> repKg(b) > repKg(a) ? b : a);
}
function previousLoggedWeek(day, exId){
  for(let w=state.week-1; w>=1; w--){
    const s = bestSetOf(w, day, exId);
    if(s) return {week:w, set:s};
  }
  return null;
}
function suggestedSets(day, exId, setCount, isUni){
  const n = setCount || 3;
  const prev = previousLoggedWeek(day, exId);
  if(!prev){
    return Array.from({length:n}, ()=> isUni ? {kgL:"",kgR:"",reps:"",done:false} : {kg:"",reps:"",done:false});
  }
  const increment = COMPOUND_IDS.has(exId) ? 2.5 : 1;
  const repsStr = prev.set.reps || "";
  if(isUni){
    const prevL = parseFloat(prev.set.kgL!==undefined ? prev.set.kgL : prev.set.kg) || 0;
    const prevR = parseFloat(prev.set.kgR!==undefined ? prev.set.kgR : prev.set.kg) || 0;
    const kgLStr = (Math.round((prevL+increment)*2)/2).toString();
    const kgRStr = (Math.round((prevR+increment)*2)/2).toString();
    return Array.from({length:n}, ()=>({kgL:kgLStr, kgR:kgRStr, reps:repsStr, done:false, suggested:true}));
  }
  const suggestedKg = (parseFloat(prev.set.kg) + increment);
  const kgStr = (Math.round(suggestedKg*2)/2).toString();
  return Array.from({length:n}, ()=>({kg:kgStr, reps:repsStr, done:false, suggested:true}));
}

/* ---------- Double progression / auto-ajustement ---------- */
function shouldIncreaseLoad(ex, exLog){
  if(!ex.tempo || !ex.rir) return false;
  const targetRIR = phaseOf(state.week)===1 ? ex.rir[0] : ex.rir[1];
  const doneSets = exLog.sets.filter(s=>s.done);
  if(doneSets.length === 0) return false;
  // Si toutes les séries sont complétées et qu'au moins une a atteint le RIR cible (approximation : reps dans la fourchette haute)
  const repRange = ex.reps[phaseOf(state.week)===1?0:1].split("-").map(Number);
  const highRep = repRange[1] || repRange[0];
  const allDone = doneSets.length >= ex.sets;
  const someHighRep = doneSets.some(s=> parseInt(s.reps) >= highRep);
  return allDone && someHighRep;
}

function tempoStripHTML(tempo){

  return `<div class="tempo-strip">${seg("ecc",ecc)}${seg("pause",pauseB)}${seg("con",con)}${seg("pause",pauseH)}</div>
  <div class="tempo-legend"><span>↓${ecc}s</span><span>⏸${pauseB}s</span><span>↑${con}s</span><span>⏸${pauseH}s</span></div>`;
}
function rirLabel(rir){
  if(!rir) return null;
  const idx = phaseOf(state.week)===1?0:1;
  const val = idx===0?rir[0]:rir[1];
  return "RIR "+(val===0.5?"0-1":val);
}
function repsTarget(ex){
  if(!ex.reps) return null;
  const idx = phaseOf(state.week)===1?0:1;
  return ex.reps[idx];
}
function estimate1RM(kg,reps){ return kg*(1+reps/30); }

      ${prev ? `<div class="progress-line" id="prog-${ex.id}"></div>` : (ex.tempo ? `<div class="progress-line"><span class="progress-text">Première fois cette semaine</span></div>` : "")}
      <div class="ex-meta">
        ${ex.tempo ? `<span class="meta-chip rir">${rirLabel(ex.rir)}</span>` : `<span class="meta-chip">isométrique</span>`}
        ${ex.sets ? `<span class="meta-chip">${ex.sets}×${repsTarget(ex) || "hold"}</span>` : ``}
        ${ex.tempo ? `<button class="tempo-toggle" data-ex="${ex.id}">tempo ▾</button>` : ``}
        ${ex.tip ? `<button class="tip-toggle" data-ex="${ex.id}">💡 conseil ▾</button>` : ``}
        ${shouldIncreaseLoad(ex, exLog) ? '<span class="meta-chip" style="background:rgba(79,216,208,0.15); color:var(--pulse);">↑ charge suggérée</span>' : ''}
      </div>
      ${ex.tempo ? `<div class="tempo-detail" id="tempo-${ex.id}">${tempoStripHTML(ex.tempo)}</div>` : ``}
      ${ex.tip ? `<div class="tip-detail" id="tip-${ex.id}">${ex.tip}</div>` : ``}
      ${(ex.tempo && !COMPOUND_IDS.has(ex.id) && phaseOf(state.week)===2) ? `<div class="tip-detail show" style="display:block; border-left-color:var(--pulse); margin-top:9px;">💡 Myo-reps sur la dernière série possible.</div>` : ``}
      <div class="sets" data-ex="${ex.id}"></div>
      ${ex.unilateral ? `<div class="sym-chip" id="sym-${ex.id}"></div>` : ``}
      <div class="set-actions">
        <button class="mini-btn add-set">+ série</button>
        ${ex.tempo && COMPOUND_IDS.has(ex.id) ? `<button class="mini-btn rest-btn" data-rest="compound">Repos 2:30</button>` : ex.tempo ? `<button class="mini-btn rest-btn" data-rest="isolation">Repos 1:15</button>` : ``}
      </div>
    `;
    list.appendChild(card);

    if(prev){
      const pEl = card.querySelector(`#prog-${ex.id}`);
      const prevKg = repKg(prev.set);
      const curBest = bestSetOf(state.week, activeDay, ex.id);
      const curKg = curBest ? repKg(curBest) : null;
      let arrow="flat", diffTxt="pas encore loggé cette semaine";
      if(curKg!==null){
        if(curKg>prevKg){ arrow="up"; diffTxt = `+${(curKg-prevKg).toFixed(1)}kg vs S${prev.week}`; }
        else if(curKg<prevKg){ arrow="down"; diffTxt = `${(curKg-prevKg).toFixed(1)}kg vs S${prev.week}`; }
        else { diffTxt = `= vs S${prev.week}`; }
      }
      const arrowChar = arrow==="up"?"↑":arrow==="down"?"↓":"→";
      const prevLabel = ex.unilateral ? `${repKg(prev.set).toFixed(1)}kg moy.` : `${prev.set.kg}kg`;
      pEl.innerHTML = `<span class="arrow ${arrow}">${arrowChar}</span><span class="progress-text">S${prev.week}: <b>${prevLabel}×${prev.set.reps}</b> — ${diffTxt}</span>`;
    }

    const tempoBtn = card.querySelector(".tempo-toggle");
    if(tempoBtn) tempoBtn.onclick = ()=>{
      const detail = card.querySelector(`#tempo-${ex.id}`);
      detail.classList.toggle("show");
      tempoBtn.textContent = detail.classList.contains("show") ? "tempo ▴" : "tempo ▾";
    };
    const tipBtn = card.querySelector(".tip-toggle");
    if(tipBtn) tipBtn.onclick = ()=>{
      const detail = card.querySelector(`#tip-${ex.id}`);
      detail.classList.toggle("show");
      tipBtn.textContent = (detail.classList.contains("show") ? "💡 conseil ▴" : "💡 conseil ▾");
    };

    const setsWrap = card.querySelector(".sets");
    const symEl = card.querySelector(`#sym-${ex.id}`);
    function updateSym(){
      if(!symEl) return;
      const doneSets = exLog.sets.filter(s=>s.done && s.kgL && s.kgR);
      if(!doneSets.length){ symEl.innerHTML=""; return; }
      const last = doneSets[doneSets.length-1];
      const l = parseFloat(last.kgL), r = parseFloat(last.kgR);
      const diff = Math.abs(l-r);
      const pct = Math.max(l,r) ? Math.round(diff/Math.max(l,r)*100) : 0;
      const cls = pct<=5 ? "ok" : pct<=15 ? "warn" : "bad";
      symEl.innerHTML = `<span class="sym-badge ${cls}">Δ G/D ${diff.toFixed(1)}kg (${pct}%)</span>`;
    }
    const step = COMPOUND_IDS.has(ex.id) ? 2.5 : 1;

    function renderSets(){
      setsWrap.innerHTML = "";
      exLog.sets.forEach((s,si)=>{
        const row = document.createElement("div");
        if(ex.unilateral){
          row.className = "set-row uni";
          row.innerHTML = `
            <div class="set-num mono">${si+1}</div>
            <input type="number" inputmode="decimal" placeholder="kg G" value="${s.kgL||''}" class="${s.suggested?'is-suggested':''}">
            <input type="number" inputmode="decimal" placeholder="kg D" value="${s.kgR||''}" class="${s.suggested?'is-suggested':''}">
            <input type="number" inputmode="numeric" placeholder="${repsTarget(ex) || 'reps'}" value="${s.reps}" class="${s.suggested?'is-suggested':''}">
            <button class="done-toggle ${s.done?'on':''}">${s.done?'✓':''}</button>
            <button class="delete-set">✕</button>
          `;
          const [_, kgL, kgR, repsInput, doneBtn, delBtn] = row.children;
          kgL.oninput = ()=>{ s.kgL = kgL.value; s.suggested=false; kgL.classList.remove('is-suggested'); saveState(); };
          kgR.oninput = ()=>{ s.kgR = kgR.value; s.suggested=false; kgR.classList.remove('is-suggested'); saveState(); };
          repsInput.oninput = ()=>{ s.reps = repsInput.value; s.suggested=false; repsInput.classList.remove('is-suggested'); saveState(); };
          doneBtn.onclick = ()=>{
            s.done = !s.done;
            if(s.done && s.kgL && s.kgR && s.reps) {
              const newPr = checkPR(ex.id, repKg(s), parseFloat(s.reps));
              if(newPr) prCount++;
            }
            log.date = todayISO();
            saveState();
            renderExercises();
            renderWeekStepper();
          };
          delBtn.onclick = ()=>{
            if(exLog.sets.length <= 1) return;
            exLog.sets.splice(si,1);
            saveState(); renderSets(); renderExercises();
          };
        } else {
          row.className = "set-row";
          row.innerHTML = `
            <div class="set-num mono">${si+1}</div>
            <div class="kg-wrap">
              <button type="button" class="step-btn step-down">−</button>
              <input type="number" inputmode="decimal" placeholder="kg" value="${s.kg}" class="${s.suggested?'is-suggested':''}">
              <button type="button" class="step-btn step-up">+</button>
            </div>
            <input type="number" inputmode="numeric" placeholder="${repsTarget(ex) || 'reps'}" value="${s.reps}" class="${s.suggested?'is-suggested':''}">
            <button class="done-toggle ${s.done?'on':''}">${s.done?'✓':''}</button>
            <button class="delete-set">✕</button>
          `;
          const [_, kgWrap, repsInput, doneBtn, delBtn] = row.children;
          const stepDown = kgWrap.querySelector(".step-down");
          const kgInput = kgWrap.querySelector("input");
          const stepUp = kgWrap.querySelector(".step-up");
          kgInput.oninput = ()=>{ s.kg = kgInput.value; s.suggested=false; kgInput.classList.remove('is-suggested'); saveState(); };
          const applyStep = (dir)=>{
            const cur = parseFloat(kgInput.value) || 0;
            const next = Math.max(0, Math.round((cur + dir*step)*2)/2);
            kgInput.value = next;
            s.kg = String(next); s.suggested=false; kgInput.classList.remove('is-suggested');
            saveState();
          };
          stepDown.onclick = ()=> applyStep(-1);
          stepUp.onclick = ()=> applyStep(1);
          repsInput.oninput = ()=>{ s.reps = repsInput.value; s.suggested=false; repsInput.classList.remove('is-suggested'); saveState(); };
          doneBtn.onclick = ()=>{
            s.done = !s.done;
            if(s.done && s.kg && s.reps) {
              const newPr = checkPR(ex.id, parseFloat(s.kg), parseFloat(s.reps));
              if(newPr) prCount++;
            }
            log.date = todayISO();
            saveState();
            renderExercises();
            renderWeekStepper();
          };
          delBtn.onclick = ()=>{
            if(exLog.sets.length <= 1) return;
            exLog.sets.splice(si,1);
            saveState(); renderSets(); renderExercises();
          };
        }
        setsWrap.appendChild(row);
        if(s.done) sessionVolume += (repKg(s) * (parseInt(s.reps)||0));
      });
      updateSym();
    }
    renderSets();
    card.querySelector(".add-set").onclick = ()=>{ exLog.sets.push(ex.unilateral ? {kgL:"",kgR:"",reps:"",done:false} : {kg:"",reps:"",done:false}); saveState(); renderSets(); };
    const restBtn = card.querySelector("[data-rest]");
    if(restBtn) restBtn.onclick = ()=> startTimer(restBtn.dataset.rest, ex.name);
  });

  document.getElementById("dayProgress").textContent = doneCount+"/"+totalCount+" exercices";
  document.getElementById("completeBanner").classList.toggle("show", totalCount>0 && doneCount===totalCount);

  // Session summary
  const summaryEl = document.getElementById("sessionSummary");
  if(doneCount > 0){
    summaryEl.classList.add("show");
    summaryEl.innerHTML = `
      <strong>Résumé de la séance</strong><br>
      Volume total : <b>${sessionVolume.toFixed(0)} kg</b> · PR aujourd'hui : <b>${prCount}</b><br>
      Exercices complétés : ${doneCount}/${totalCount}
    `;
  } else {
    summaryEl.classList.remove("show");
  }
}

function checkPR(exId, kg, reps){
  const est = estimate1RM(kg,reps);
  const existing = state.prs[exId];
  if(!existing || est > estimate1RM(existing.kg, existing.reps)){
    state.prs[exId] = {kg, reps, date: todayISO()};
    saveState();
    return true;
  }
  return false;
}

/* ---------- Timer intelligent ---------- */
let timerInterval = null;
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.18,0.36].forEach((delay,i)=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = "sine"; o.frequency.value = i<2 ? 880 : 1175;
      g.gain.value = 0.001;
      const t = ctx.currentTime + delay;
      g.gain.exponentialRampToValueAtTime(0.18, t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
      o.start(t); o.stop(t+0.16);
    });
  }catch(e){}
}
function startTimer(type, label){
  let seconds = REST_BY_TYPE[type] ?? 90;
  // Timer intelligent : ajuste selon le RIR (si faible, ajoute 30s)
  const ex = PROGRAM[activeDay].exercises.find(e=>e.name===label);
  if(ex && ex.rir){
    const rirVal = phaseOf(state.week)===1 ? ex.rir[0] : ex.rir[1];
    if(rirVal <= 1) seconds += 30;
  }
  let remaining = seconds;
  const overlay = document.getElementById("timerOverlay");
  document.getElementById("timerLabel").textContent = "Repos — " + label;
  overlay.classList.add("show");
  clearInterval(timerInterval);
  const numEl = document.getElementById("timerNum");
  function tick(){
    const m = String(Math.floor(remaining/60)).padStart(2,"0");
    const s = String(remaining%60).padStart(2,"0");
    numEl.textContent = m+":"+s;
    if(remaining<=0){ clearInterval(timerInterval); if(navigator.vibrate) navigator.vibrate([150,80,150]); beep(); return; }
    remaining--;
  }
  tick();
  timerInterval = setInterval(tick,1000);
}
document.getElementById("timerClose").onclick = ()=>{
  document.getElementById("timerOverlay").classList.remove("show");
  clearInterval(timerInterval);
};

/* ---------- Wake lock ---------- */

  try{ if("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }catch(e){}
}
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") requestWakeLock(); });

requestWakeLock();

/* ---------- Settings modal + chart ---------- */
function bodyFatDW(sum4mm, age){
  let C,M;
  if(age<20){C=1.1620;M=0.0630;}
  else if(age<30){C=1.1631;M=0.0632;}
  else if(age<40){C=1.1422;M=0.0544;}
  else if(age<50){C=1.1620;M=0.0700;}
  else {C=1.1715;M=0.0779;}
  const density = C - M*Math.log10(sum4mm);
  const bf = (495/density) - 450;
  return Math.round(bf*10)/10;
}
function renderMeasurements(){
  const wrap = document.getElementById("mHistory");
  const entries = state.measurements.map((m,idx)=>({m,idx})).slice(-6).reverse();
  wrap.innerHTML = entries.length ? entries.map(({m,idx})=>{
    const ratio = (m.waist ? (m.shoulders/m.waist).toFixed(2) : "—");
    const parts = [];
    if(m.shoulders||m.waist) parts.push(`épaules ${m.shoulders||"—"}cm / taille ${m.waist||"—"}cm (ratio ${ratio})`);
    if(m.pecs) parts.push(`pecs ${m.pecs}cm`);
    if(m.armL||m.armR) parts.push(`bras G${m.armL||"—"}/D${m.armR||"—"}cm`);
    if(m.thighL||m.thighR) parts.push(`cuisse G${m.thighL||"—"}/D${m.thighR||"—"}cm`);
    if(m.bodyFat) parts.push(`<b style="color:var(--signal);">${m.bodyFat}% MG</b>`);
    return `<div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px; padding:5px 0; border-bottom:1px solid var(--line);">
      <span>${m.date}<br>${parts.join(" · ")}</span>
      <button class="m-delete" data-idx="${idx}" style="background:none; border:none; color:var(--danger); font-size:15px; cursor:pointer; padding:2px 6px;">✕</button>
    </div>`;
  }).join("") : "Aucune mesure enregistrée.";
  wrap.querySelectorAll(".m-delete").forEach(btn=>{
    btn.onclick = ()=>{
      state.measurements.splice(parseInt(btn.dataset.idx), 1);
      saveState();
      renderMeasurements();
    };
  });
  drawChart();
}
function drawChart(){
  const canvas = document.getElementById("measChart");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  const data = state.measurements.slice(-10);
  if(data.length < 2) return;
  const vals = data.map(m=>m.shoulders || 0);
  const max = Math.max(...vals, 100);
  const min = Math.min(...vals, 50);
  const range = max - min || 1;
  ctx.beginPath();
  ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--signal').trim();
  ctx.lineWidth = 2;
  data.forEach((m,i)=>{
    const x = (i/(data.length-1))*w;
    const y = h - ((m.shoulders-min)/range)*h;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
}
document.getElementById("mAdd").onclick = ()=>{
  const shoulders = parseFloat(document.getElementById("mShoulders").value) || null;
  const waist = parseFloat(document.getElementById("mWaist").value) || null;
  const pecs = parseFloat(document.getElementById("mPecs").value) || null;
  const armL = parseFloat(document.getElementById("mArmL").value) || null;
  const armR = parseFloat(document.getElementById("mArmR").value) || null;
  const thighL = parseFloat(document.getElementById("mThighL").value) || null;
  const thighR = parseFloat(document.getElementById("mThighR").value) || null;
  const skB = parseFloat(document.getElementById("skBiceps").value);
  const skT = parseFloat(document.getElementById("skTriceps").value);
  const skS = parseFloat(document.getElementById("skSubscap").value);
  const skI = parseFloat(document.getElementById("skSuprailiac").value);
  const age = parseFloat(document.getElementById("mAge").value);
  let bodyFat = null;
  if(skB && skT && skS && skI && age){ bodyFat = bodyFatDW(skB+skT+skS+skI, age); }
  if(!shoulders && !waist && !pecs && !armL && !armR && !thighL && !thighR && !bodyFat) return;
  state.measurements.push({date: todayISO(), shoulders, waist, pecs, armL, armR, thighL, thighR, bodyFat, age: age||null});
  ["mShoulders","mWaist","mPecs","mArmL","mArmR","mThighL","mThighR","skBiceps","skTriceps","skSubscap","skSuprailiac"].forEach(id=> document.getElementById(id).value = "");
  saveState();
  renderMeasurements();
};
document.getElementById("gearBtn").onclick = ()=>{ renderMeasurements(); document.getElementById("modalOverlay").classList.add("show"); };
document.getElementById("modalClose").onclick = ()=> document.getElementById("modalOverlay").classList.remove("show");
document.getElementById("exportBtn").onclick = ()=>{
  const ta = document.getElementById("importArea");
  ta.value = JSON.stringify(state, null, 2);
  navigator.clipboard.writeText(ta.value).catch(()=>{ ta.select(); document.execCommand("copy"); });
};
document.getElementById("importBtn").onclick = ()=>{
  try{
    const parsed = JSON.parse(document.getElementById("importArea").value);
    state = Object.assign(defaultState(), parsed);
    saveState(); renderAll();
    alert("Importé.");
  }catch(e){ alert("JSON invalide."); }
};
document.getElementById("resetBtn").onclick = ()=>{
  if(confirm("Réinitialiser toutes les données ?")){ state = defaultState(); saveState(); renderAll(); }
};

/* ---------- init ---------- */
function renderAll(){
  applyTheme();
  renderWeekStepper();
  renderDayNav();
  renderExercises();
}
renderAll();
})();
