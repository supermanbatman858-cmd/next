<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fréquence Pro</title>
    <style>
        :root {
            --bg: #12141A; --surface: #1B1E27; --surface2: #232733; --line: #2C303C;
            --text: #EDEEF2; --muted: #8A8FA3; --muted2: #5C6072;
            --signal: #E8A33D; --pulse: #4FD8D0; --danger: #E85D4A; --good: #6FCF97;
            --warm: #F0A868; --cool: #5FB8D4; --radius: 10px;
        }
        body.light {
            --bg: #F5F5F7; --surface: #FFFFFF; --surface2: #F0F0F5; --line: #E0E0E6;
            --text: #1A1A2E; --muted: #6B7280; --muted2: #9CA3AF;
            --signal: #D97706; --pulse: #0D9488; --danger: #DC2626; --good: #059669;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace; }
        #app { max-width: 520px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        header.top {
            position: sticky; top: 0; z-index: 20; background: rgba(18,20,26,0.95);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 12px 16px 0;
        }
        body.light header.top { background: rgba(245,245,247,0.95); }
        .brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .brand { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
        .gear-btn, .theme-toggle { background: none; border: none; color: var(--muted); font-size: 18px; padding: 4px; cursor: pointer; }
        .program-bar-wrap { margin-bottom: 10px; }
        .program-bar-track { height: 6px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
        .program-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pulse), var(--signal)); border-radius: 4px; transition: width .3s; }
        .program-bar-label { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); margin-top: 4px; }
        .week-stepper { display: flex; align-items: center; gap: 10px; padding-bottom: 10px; }
        .week-arrow { width: 32px; height: 32px; border-radius: 8px; background: var(--surface); border: 1px solid var(--line); color: var(--text); font-size: 15px; cursor: pointer; }
        .week-track { flex: 1; display: flex; gap: 4px; }
        .week-dot { flex: 1; height: 34px; border-radius: 6px; background: var(--surface); border: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--muted2); cursor: pointer; position: relative; }
        .week-dot.current { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 700; }
        .week-dot .pct { font-size: 8px; opacity: 0.7; margin-top: 1px; }
        .week-dot.full { border-color: var(--good); }
        .week-dot.full::after { content: "✓"; position: absolute; top: -6px; right: -4px; width: 14px; height: 14px; border-radius: 50%; background: var(--good); color: #0c1a12; font-size: 8.5px; display: flex; align-items: center; justify-content: center; }
        .phase-label { text-align: center; font-size: 10px; color: var(--signal); letter-spacing: 0.06em; text-transform: uppercase; padding-bottom: 10px; }
        nav.days { display: flex; gap: 6px; overflow-x: auto; padding: 0 16px 12px; scrollbar-width: none; }
        nav.days::-webkit-scrollbar { display: none; }
        .day-btn { flex-shrink: 0; background: var(--surface); border: 1px solid var(--line); color: var(--muted); padding: 8px 13px; border-radius: 20px; font-size: 12.5px; font-weight: 600; cursor: pointer; white-space: nowrap; position: relative; }
        .day-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        .day-btn .grp { display: block; font-size: 9px; font-weight: 500; opacity: 0.65; margin-top: 1px; }
        .day-btn.complete::before { content: "✓"; position: absolute; top: -5px; right: -4px; width: 15px; height: 15px; border-radius: 50%; background: var(--good); color: #0c1a12; font-size: 9px; display: flex; align-items: center; justify-content: center; }
        main { flex: 1; padding: 14px 16px 40px; }
        .day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .day-header h2 { font-size: 16px; }
        .day-progress { font-size: 11.5px; color: var(--muted); }
        .week-brief { background: #B8E8E2; border: 1px solid #7DCFC5; border-left: 4px solid #2E9C8F; border-radius: 0 var(--radius) var(--radius) 0; padding: 13px 14px; margin-bottom: 16px; }
        .week-brief .wb-title { font-size: 13px; font-weight: 800; color: #0A2E28; letter-spacing: 0.02em; margin-bottom: 6px; }
        .week-brief .wb-text { font-size: 13.5px; font-weight: 500; line-height: 1.6; color: #000000; }
        .complete-banner { display: none; background: linear-gradient(90deg, rgba(111,207,151,0.15), rgba(79,216,208,0.1)); border: 1px solid rgba(111,207,151,0.35); color: var(--good); font-size: 12.5px; padding: 10px 12px; border-radius: 9px; margin-bottom: 12px; text-align: center; }
        .complete-banner.show { display: block; }
        .flow-card { border-radius: var(--radius); padding: 13px 14px; margin-bottom: 12px; border: 1px solid var(--line); }
        .flow-card.warmup { background: #F0C89A; border-color: #E0A868; }
        .flow-card.stretch { background: #BCE4EC; border-color: #8FCBD8; }
        .flow-head { display: flex; align-items: center; gap: 7px; cursor: pointer; }
        .flow-icon { font-size: 14px; }
        .flow-title { font-size: 13.5px; font-weight: 700; color: #1A1408; }
        .flow-card.stretch .flow-title { color: #0D2226; }
        .flow-sub { font-size: 10.5px; color: #4A3E28; margin-left: auto; }
        .flow-list { display: none; margin: 12px 0 0; padding: 0; list-style: none; }
        .flow-list.show { display: block; }
        .flow-list li { font-size: 14.5px; font-weight: 600; color: #000000; padding: 7px 0 7px 20px; position: relative; line-height: 1.6; }
        .flow-list li::before { content: "•"; position: absolute; left: 2px; top: 7px; color: #5A4A2E; font-size: 14px; }
        .exercise-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; transition: opacity .2s; }
        .exercise-card.ex-done { opacity: 0.55; border-color: var(--good); }
        .ex-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .ex-name { font-size: 14.5px; font-weight: 700; }
        .ex-idx { color: var(--muted2); font-size: 12px; margin-right: 6px; }
        .progress-line { display: flex; align-items: center; gap: 6px; margin-top: 8px; padding: 7px 9px; background: var(--surface2); border-radius: 7px; }
        .arrow.up { color: var(--good); } .arrow.down { color: var(--danger); } .arrow.flat { color: var(--muted2); }
        .ex-meta { display: flex; gap: 8px; margin-top: 9px; flex-wrap: wrap; align-items: center; }
        .meta-chip { font-size: 10.5px; padding: 3px 7px; border-radius: 5px; background: var(--surface2); color: var(--muted); }
        .meta-chip.rir { color: var(--signal); background: rgba(232,163,61,0.1); }
        .sets { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
        .set-row { display: grid; grid-template-columns: 22px 1fr 1fr 40px 20px; gap: 8px; align-items: center; }
        .set-row.uni { grid-template-columns: 20px 1fr 1fr 0.9fr 40px 20px; }
        .set-row input { width: 100%; background: var(--surface2); border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 8px; font-size: 14px; font-family: 'IBM Plex Mono', monospace; }
        .set-row input.is-suggested { color: var(--signal); border-color: rgba(232,163,61,0.4); background: rgba(232,163,61,0.06); }
        .done-toggle { width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface2); color: var(--muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .done-toggle.on { background: var(--good); border-color: var(--good); color: #0c1a12; }
        .delete-set { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; }
        .set-actions { display: flex; gap: 8px; margin-top: 9px; }
        .mini-btn { background: none; border: 1px dashed var(--line); color: var(--muted); font-size: 11.5px; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        .rest-btn { background: var(--surface2); border: 1px solid var(--line); color: var(--pulse); }
        .pr-badge { font-size: 10px; background: var(--signal); color: #0c1a12; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-left: 6px; }
        .session-summary { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin-top: 16px; display: none; }
        .session-summary.show { display: block; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(12,13,17,0.85); backdrop-filter: blur(4px); z-index: 60; display: none; align-items: flex-end; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-sheet { width: 100%; max-width: 520px; background: var(--surface); border-radius: 16px 16px 0 0; padding: 18px 16px 28px; border: 1px solid var(--line); max-height: 85vh; overflow-y: auto; }
        .modal-sheet h3 { font-size: 15px; margin-bottom: 12px; }
        .timer-overlay { position: fixed; inset: 0; background: rgba(12,13,17,0.92); backdrop-filter: blur(6px); z-index: 50; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .timer-overlay.show { display: flex; }
        .timer-num { font-size: 64px; font-weight: 700; color: var(--pulse); }
        .timer-label { color: var(--muted); font-size: 13px; margin-top: 6px; }
        .timer-close { margin-top: 26px; background: var(--surface2); border: 1px solid var(--line); color: var(--text); padding: 10px 22px; border-radius: 20px; cursor: pointer; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
    </style>
</head>
<body>
<div id="app">
    <header class="top">
        <div class="brand-row"><div class="brand">Fréquence Pro</div><div><button class="theme-toggle" id="themeToggle">🌓</button><button class="gear-btn" id="gearBtn">⚙</button></div></div>
        <div class="program-bar-wrap"><div class="program-bar-track"><div class="program-bar-fill" id="programBarFill" style="width:0%"></div></div><div class="program-bar-label"><span id="programBarText">0% du programme</span><span id="programStreak"></span></div></div>
        <div class="week-stepper"><button class="week-arrow" id="weekPrev">‹</button><div class="week-track" id="weekTrack"></div><button class="week-arrow" id="weekNext">›</button></div>
        <div class="phase-label" id="phaseLabel"></div>
        <nav class="days" id="dayNav"></nav>
    </header>
    <main>
        <div class="week-complete-banner" id="weekCompleteBanner"><span id="weekCompleteText"></span><button id="weekCompleteBtn">Semaine suivante →</button></div>
        <div class="week-brief" id="weekBrief"></div>
        <div class="day-header"><h2 id="dayTitle"></h2><div class="day-progress mono" id="dayProgress"></div></div>
        <div class="complete-banner" id="completeBanner">Séance terminée 💪</div>
        <div id="warmupSlot"></div>
        <div id="exerciseList"></div>
        <div id="stretchSlot"></div>
        <div id="sessionSummary" class="session-summary"></div>
    </main>
</div>
<div class="timer-overlay" id="timerOverlay"><div class="timer-num mono" id="timerNum">02:00</div><div class="timer-label" id="timerLabel">Repos</div><button class="timer-close" id="timerClose">Fermer</button></div>
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-sheet">
        <div style="display:flex; gap:8px; margin-bottom:16px; overflow-x:auto;">
            <button class="mini-btn tab active" data-tab="measures">Mesures</button>
            <button class="mini-btn tab" data-tab="profile">Profil</button>
            <button class="mini-btn tab" data-tab="nutrition">Nutrition</button>
            <button class="mini-btn tab" data-tab="mobility">Mobilité</button>
            <button class="mini-btn tab" data-tab="data">Données</button>
        </div>
        <div class="tab-content" id="tab-measures">
            <h3>Mesures</h3>
            <div class="field-row"><div class="field"><label>Épaules</label><input type="number" step="0.5" id="mShoulders"></div><div class="field"><label>Taille</label><input type="number" step="0.5" id="mWaist"></div></div>
            <div class="field-row"><div class="field"><label>Pecs</label><input type="number" step="0.5" id="mPecs"></div><div class="field"></div></div>
            <div class="field-row"><div class="field"><label>Bras G</label><input type="number" step="0.5" id="mArmL"></div><div class="field"><label>Bras D</label><input type="number" step="0.5" id="mArmR"></div></div>
            <div class="field-row"><div class="field"><label>Cuisse G</label><input type="number" step="0.5" id="mThighL"></div><div class="field"><label>Cuisse D</label><input type="number" step="0.5" id="mThighR"></div></div>
            <h3>4 plis</h3>
            <div class="field-row"><div class="field"><label>Biceps</label><input type="number" step="0.1" id="skBiceps"></div><div class="field"><label>Triceps</label><input type="number" step="0.1" id="skTriceps"></div></div>
            <div class="field-row"><div class="field"><label>Sous-scap</label><input type="number" step="0.1" id="skSubscap"></div><div class="field"><label>Supra-iliaque</label><input type="number" step="0.1" id="skSuprailiac"></div></div>
            <div class="field-row"><div class="field"><label>Âge</label><input type="number" id="mAge"></div><div class="field"><button class="mini-btn" id="mAdd">Ajouter</button></div></div>
            <div id="mHistory" class="mono" style="max-height:160px; overflow-y:auto;"></div>
        </div>
        <div class="tab-content" id="tab-profile" style="display:none;">
            <h3>Profil</h3>
            <label>Largeur épaules</label><select id="shoulderWidth"><option value="moyen">Moyenne</option><option value="large">Large</option><option value="etroit">Étroite</option></select>
            <label>Longueur bras</label><select id="armLength"><option value="moyen">Moyens</option><option value="long">Longs</option><option value="court">Courts</option></select>
            <label>Biceps</label><select id="bicepInsertion"><option value="moyen">Moyenne</option><option value="haute">Haute</option><option value="basse">Basse</option></select>
            <label>Sommeil (h)</label><input type="number" id="sleepHours" min="0" max="12" value="7">
            <label>Stress (1-10)</label><input type="number" id="stressLevel" min="1" max="10" value="3">
            <label>Groupe prioritaire</label><select id="priorityGroup"><option value="">Aucun</option><option value="pecs">Pecs</option><option value="dos">Dos</option><option value="jambes">Jambes</option></select>
            <button class="mini-btn" id="saveProfile">Appliquer</button>
        </div>
        <div class="tab-content" id="tab-nutrition" style="display:none;">
            <h3>Macros</h3>
            <label>Poids (kg)</label><input type="number" id="nutWeight" value="75">
            <label>Objectif</label><select id="nutGoal"><option value="gain">Prise de masse</option><option value="maintien">Maintien</option><option value="seche">Sèche</option></select>
            <label>Activité</label><select id="nutActivity"><option value="1.2">Sédentaire</option><option value="1.5" selected>Modéré</option><option value="1.8">Très actif</option></select>
            <button class="mini-btn" id="calcMacros">Calculer</button>
            <div id="macroResult"></div>
        </div>
        <div class="tab-content" id="tab-mobility" style="display:none;">
            <h3>Test mobilité</h3>
            <p>Répondez aux questions :</p>
            <ul><li>Toucher orteils jambes tendues ?</li><li>Mains derrière le dos ?</li><li>Squat profond talons au sol ?</li></ul>
            <button class="mini-btn" id="runMobilityTest">Évaluer</button>
            <div id="mobilityIssues"></div>
        </div>
        <div class="tab-content" id="tab-data" style="display:none;">
            <h3>Données</h3>
            <button class="io-btn" id="exportBtn">Copier JSON</button>
            <textarea id="importArea" placeholder="Coller un export JSON..."></textarea>
            <div class="io-row"><button class="io-btn" id="importBtn">Importer</button><button class="io-btn" id="resetBtn" style="color:var(--danger);">Reset</button></div>
        </div>
        <button class="modal-close" id="modalClose">Fermer</button>
    </div>
</div>

<script>
(function(){"use strict";
const PROGRAM={lundi:{title:"Pecs + Triceps",sub:"dominant",groups:["pecs","triceps"],warmup:["<b>Général</b> — 2-3 min vélo/rameur léger ou 30 jumping jacks","<b>Articulaire</b> — rotations d'épaules 20x avant/arrière, cercles de poignets 15x","<b>Activation</b> — écartés légers au poids du corps 15 reps + pompes à vide 2×10","<b>Potentiation</b> — barre à vide sur le banc décliné 1×10, puis 1 série à 50% de la charge de travail"],stretch:["Pecs en appui sur cadre de porte, 30s/côté","Triceps bras au-dessus de la tête, 30s/côté","Croisé de l'épaule avant, 20s/côté","Respiration diaphragmatique, 3-4 cycles"],exercises:[{id:"decline",name:"Développé décliné (barre libre)",tempo:[2,0,1,0],rir:[2,1],tip:"Coudes à ~45°, omoplates serrées.",sets:4,reps:["8-10","5-6"]},{id:"inclineSm",name:"Incliné (Smith)",tempo:[2,1,1,0],rir:[1,0.5],tip:"Banc 30-45°.",sets:4,reps:["10-12","6-8"]},{id:"dips",name:"Dips lestés",tempo:[2,0,1,0],rir:[1,0.5],tip:"Buste penché.",sets:3,reps:["8-12","6-8"]},{id:"pushup",name:"Pompes lestées",tempo:[2,0,1,0],rir:[1,0],tip:"Corps aligné.",sets:3,reps:["10-15","8-10"]},{id:"triOhInc",name:"Triceps au-dessus tête (banc incliné)",tempo:[3,1,1,0],rir:[1,0],tip:"Coudes fixes.",sets:3,reps:["10-12","8-10"]},{id:"triRopeExt",name:"Triceps corde",tempo:[2,1,1,1],rir:[0.5,0],tip:"Écarte les mains.",sets:3,reps:["12-15","10-12"]}]},

const DAY_ORDER=["lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const DAY_LABEL={lundi:"Lun",mardi:"Mar",mercredi:"Mer",jeudi:"Jeu",vendredi:"Ven",samedi:"Sam"};
const TOTAL_WEEKS=6;
const COMPOUND_IDS=new Set(["decline","inclineSm","squat","goodmorning","hipthrust","dbbench","ohp","tirageUniInc","australienne","tirageSerre","rowUniPenche","rowUniBanc","tirageLarge","dips"]);

let state;
const STORAGE_KEY="frequence_premium_gh";
function defaultState(){return{week:1,logs:{},prs:{},measurements:[],theme:'dark',profile:{shoulderWidth:'moyen',armLength:'moyen',bicepInsertion:'moyen',sleepHours:7,stressLevel:3,priorityGroup:null},nutrition:{weight:75,goal:'maintien',activity:1.5}};}
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return defaultState();const saved=JSON.parse(raw);return Object.assign(defaultState(),saved,{profile:Object.assign(defaultState().profile,saved.profile||{}),nutrition:Object.assign(defaultState().nutrition,saved.nutrition||{})});}catch(e){return defaultState();}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
let activeDay="lundi";
function todayISO(){return new Date().toISOString().slice(0,10);}
function logKey(w,d){return "w"+w+"_"+d;}
function getLog(week,day){const k=logKey(week,day);if(!state.logs[k])state.logs[k]={exercises:{},date:""};return state.logs[k];}
function phaseOf(w){return w<=3?1:(w<=5?2:3);}
const PHASE_LABEL={1:"Accumulation",2:"Intensification",3:"Deload · tests"};
const WEEK_INTRO={1:{title:"Semaine 1 — Calibration",text:"Trouve tes poids de référence avec RIR 2 sur les composés."},2:{title:"Semaine 2 — Progression",text:"Même RIR. Charge +2.5kg composés, +1kg isolations."},3:{title:"Semaine 3 — Fin accumulation",text:"Volume cumulé, priorise la technique."},4:{title:"Semaine 4 — Intensification",text:"RIR plus bas, approche-toi de l'échec."},5:{title:"Semaine 5 — Pic",text:"La plus exigeante. Écoute ta récupération."},6:{title:"Semaine 6 — Deload",text:"Volume réduit, teste tes max."}};

function getAdjustedSets(base,exId){let s=base;const p=state.profile;if(p.sleepHours<7)s=Math.max(1,s-1);if(p.stressLevel>6)s=Math.max(1,s-1);if(p.priorityGroup){const dayGroup=PROGRAM[activeDay].groups;if(dayGroup.includes(p.priorityGroup))s+=1;else s=Math.max(1,s-1);}return s;}
function getRepsForExercise(ex){if(!ex.reps)return null;const isHeavy=state.week%2===1;const repRange=ex.reps[phaseOf(state.week)===1?0:1].split('-').map(Number);if(isHeavy)return repRange[0];else return repRange[1]||repRange[0];}
function repKg(s){if(s.kgL!==undefined){const l=parseFloat(s.kgL)||0,r=parseFloat(s.kgR)||0;if(!l&&!r)return 0;return (l+r)/2;}return parseFloat(s.kg)||0;}
function bestSetOf(week,day,exId){const log=state.logs[logKey(week,day)];if(!log||!log.exercises[exId])return null;const done=log.exercises[exId].sets.filter(s=>s.done&&repKg(s));return done.length?done.reduce((a,b)=>repKg(b)>repKg(a)?b:a):null;}
function previousLoggedWeek(day,exId){for(let w=state.week-1;w>=1;w--){const s=bestSetOf(w,day,exId);if(s)return{week:w,set:s};}return null;}
function suggestedSets(day,exId,baseSets,isUni){const n=getAdjustedSets(baseSets,exId);const prev=previousLoggedWeek(day,exId);if(!prev)return Array.from({length:n},()=>isUni?{kgL:"",kgR:"",reps:"",done:false}:{kg:"",reps:"",done:false});const inc=COMPOUND_IDS.has(exId)?2.5:1;const repsStr=prev.set.reps||"";if(isUni){const prevL=parseFloat(prev.set.kgL!==undefined?prev.set.kgL:prev.set.kg)||0,prevR=parseFloat(prev.set.kgR!==undefined?prev.set.kgR:prev.set.kg)||0;const kgLStr=(Math.round((prevL+inc)*2)/2).toString(),kgRStr=(Math.round((prevR+inc)*2)/2).toString();return Array.from({length:n},()=>({kgL:kgLStr,kgR:kgRStr,reps:repsStr,done:false,suggested:true}));}const suggestedKg=parseFloat(prev.set.kg)+inc;const kgStr=(Math.round(suggestedKg*2)/2).toString();return Array.from({length:n},()=>({kg:kgStr,reps:repsStr,done:false,suggested:true}));}
function renderFlowCard(kind,items,icon,label){const wrap=document.createElement("div");wrap.className="flow-card "+kind;wrap.innerHTML=`<div class="flow-head"><span class="flow-icon">${icon}</span><span class="flow-title">${label}</span><span class="flow-sub">${items.length} pts ▾</span></div><ul class="flow-list">${items.map(i=>`<li>${i}</li>`).join("")}</ul>`;wrap.querySelector(".flow-head").onclick=()=>{const list=wrap.querySelector(".flow-list"),sub=wrap.querySelector(".flow-sub");list.classList.toggle("show");sub.textContent=items.length+" pts "+(list.classList.contains("show")?"▴":"▾");};return wrap;}
function applyRPESuggestion(exLog,setIndex,rpeValue){if(!exLog.rpe)exLog.rpe=[];exLog.rpe[setIndex]=rpeValue;const ex=PROGRAM[activeDay].exercises.find(e=>e.id===exLog.id);if(!ex||!ex.tempo)return;const targetRIR=phaseOf(state.week)===1?ex.rir[0]:ex.rir[1];const targetRPE=10-targetRIR;const lastSet=exLog.sets[setIndex];if(rpeValue<targetRPE&&lastSet.done){const inc=COMPOUND_IDS.has(ex.id)?2.5:1;for(let i=setIndex+1;i<exLog.sets.length;i++){if(!exLog.sets[i].done){if(ex.unilateral){exLog.sets[i].kgL=(parseFloat(exLog.sets[i].kgL)+inc).toFixed(1);exLog.sets[i].kgR=(parseFloat(exLog.sets[i].kgR)+inc).toFixed(1);}else exLog.sets[i].kg=(parseFloat(exLog.sets[i].kg)+inc).toFixed(1);exLog.sets[i].suggested=true;}}}else if(rpeValue>targetRPE+1&&lastSet.done){const dec=COMPOUND_IDS.has(ex.id)?2.5:1;for(let i=setIndex+1;i<exLog.sets.length;i++){if(!exLog.sets[i].done){if(ex.unilateral){exLog.sets[i].kgL=Math.max(0,parseFloat(exLog.sets[i].kgL)-dec).toFixed(1);exLog.sets[i].kgR=Math.max(0,parseFloat(exLog.sets[i].kgR)-dec).toFixed(1);}else exLog.sets[i].kg=Math.max(0,parseFloat(exLog.sets[i].kg)-dec).toFixed(1);exLog.sets[i].suggested=true;}}}saveState();}
function renderExercises(){
  const day=PROGRAM[activeDay],log=getLog(state.week,activeDay);
  document.getElementById("warmupSlot").innerHTML="";document.getElementById("warmupSlot").appendChild(renderFlowCard("warmup",day.warmup,"🔥","Échauffement"));
  document.getElementById("stretchSlot").innerHTML="";document.getElementById("stretchSlot").appendChild(renderFlowCard("stretch",day.stretch,"🧘","Étirements"));
  const list=document.getElementById("exerciseList");list.innerHTML="";
  let doneCount=0,totalCount=0,sessionVolume=0,prCount=0;
  day.exercises.forEach((ex,i)=>{
    if(!log.exercises[ex.id])log.exercises[ex.id]={sets:ex.tempo?suggestedSets(activeDay,ex.id,ex.sets,ex.unilateral):Array.from({length:getAdjustedSets(ex.sets||3,ex.id)},()=>ex.unilateral?{kgL:"",kgR:"",reps:"",done:false}:{kg:"",reps:"",done:false}),rpe:[]};
    const exLog=log.exercises[ex.id];totalCount++;if(exLog.sets.some(s=>s.done))doneCount++;
    const card=document.createElement("div");card.className="exercise-card"+(exLog.sets.filter(s=>s.done).length>=exLog.sets.length?" ex-done":"");
    const pr=state.prs[ex.id];
    card.innerHTML=`<div class="ex-head"><span class="ex-name"><span class="ex-idx">${i+1}</span>${ex.name}${ex.unilateral?' <span class="meta-chip">L/R</span>':''}</span>${pr?`<span class="pr-badge">PR ${pr.kg}×${pr.reps}</span>`:''}</div>${ex.tempo?`<div class="ex-meta"><span class="meta-chip rir">RIR ${phaseOf(state.week)===1?ex.rir[0]:ex.rir[1]}</span><span class="meta-chip">${getAdjustedSets(ex.sets,ex.id)}×${getRepsForExercise(ex)||"hold"}</span></div>`:''}<div class="sets" data-ex="${ex.id}"></div>${ex.unilateral?`<div class="sym-chip" id="sym-${ex.id}"></div>`:''}<div class="set-actions"><button class="mini-btn add-set">+ série</button>${ex.tempo?`<button class="mini-btn rest-btn" data-rest="${COMPOUND_IDS.has(ex.id)?'compound':'isolation'}">Repos</button>`:''}</div>`;
    list.appendChild(card);
    const setsWrap=card.querySelector(".sets");
    function renderSets(){
      setsWrap.innerHTML="";
      exLog.sets.forEach((s,si)=>{
        const row=document.createElement("div");row.className="set-row"+(ex.unilateral?" uni":"");
        let html=`<div class="set-num mono">${si+1}</div>`;
        if(ex.unilateral){html+=`<input type="number" inputmode="decimal" placeholder="kg G" value="${s.kgL||''}" class="${s.suggested?'is-suggested':''}"><input type="number" inputmode="decimal" placeholder="kg D" value="${s.kgR||''}" class="${s.suggested?'is-suggested':''}"><input type="number" inputmode="numeric" placeholder="${getRepsForExercise(ex)||'reps'}" value="${s.reps}" class="${s.suggested?'is-suggested':''}">`;}
        else{html+=`<div class="kg-wrap"><button class="step-btn step-down">−</button><input type="number" inputmode="decimal" placeholder="kg" value="${s.kg}" class="${s.suggested?'is-suggested':''}"><button class="step-btn step-up">+</button></div><input type="number" inputmode="numeric" placeholder="${getRepsForExercise(ex)||'reps'}" value="${s.reps}" class="${s.suggested?'is-suggested':''}">`;}
        html+=`<button class="done-toggle ${s.done?'on':''}">${s.done?'✓':''}</button><button class="delete-set">✕</button>`;
        if(ex.tempo&&s.done)html+=`<input type="number" class="rpe-input" placeholder="RPE" value="${exLog.rpe[si]||''}" min="6" max="10" style="width:42px; margin-left:4px;">`;
        row.innerHTML=html;
        // event handlers (simplified but functional)
        if(ex.unilateral){
          const kgL=row.children[1],kgR=row.children[2],reps=row.children[3],doneBtn=row.children[4],delBtn=row.children[5];
          kgL.oninput=()=>{s.kgL=kgL.value;s.suggested=false;saveState();};kgR.oninput=()=>{s.kgR=kgR.value;s.suggested=false;saveState();};
          reps.oninput=()=>{s.reps=reps.value;s.suggested=false;saveState();};
          doneBtn.onclick=()=>{s.done=!s.done;if(s.done&&s.kgL&&s.kgR&&s.reps&&estimate1RM(repKg(s),parseFloat(s.reps))>(state.prs[ex.id]?estimate1RM(state.prs[ex.id].kg,state.prs[ex.id].reps):0)){state.prs[ex.id]={kg:repKg(s),reps:parseFloat(s.reps),date:todayISO()};prCount++;}log.date=todayISO();saveState();renderExercises();renderWeekStepper();};
          delBtn.onclick=()=>{if(exLog.sets.length<=1)return;exLog.sets.splice(si,1);saveState();renderSets();};
          if(ex.tempo&&s.done){const rpeInput=row.querySelector('.rpe-input');if(rpeInput)rpeInput.onchange=()=>{const val=parseInt(rpeInput.value);if(val>=6&&val<=10)applyRPESuggestion(exLog,si,val);else rpeInput.value='';};}
        }else{
          const kgWrap=row.children[1],reps=row.children[2],doneBtn=row.children[3],delBtn=row.children[4];
          const stepDown=kgWrap.querySelector('.step-down'),kgInput=kgWrap.querySelector('input'),stepUp=kgWrap.querySelector('.step-up');
          kgInput.oninput=()=>{s.kg=kgInput.value;s.suggested=false;saveState();};
          const applyStep=(dir)=>{const cur=parseFloat(kgInput.value)||0;const next=Math.max(0,Math.round((cur+dir*(COMPOUND_IDS.has(ex.id)?2.5:1))*2)/2);kgInput.value=next;s.kg=String(next);s.suggested=false;saveState();};
          stepDown.onclick=()=>applyStep(-1);stepUp.onclick=()=>applyStep(1);
          reps.oninput=()=>{s.reps=reps.value;s.suggested=false;saveState();};
          doneBtn.onclick=()=>{s.done=!s.done;if(s.done&&s.kg&&s.reps&&estimate1RM(parseFloat(s.kg),parseFloat(s.reps))>(state.prs[ex.id]?estimate1RM(state.prs[ex.id].kg,state.prs[ex.id].reps):0)){state.prs[ex.id]={kg:parseFloat(s.kg),reps:parseFloat(s.reps),date:todayISO()};prCount++;}log.date=todayISO();saveState();renderExercises();renderWeekStepper();};
          delBtn.onclick=()=>{if(exLog.sets.length<=1)return;exLog.sets.splice(si,1);saveState();renderSets();};
          if(ex.tempo&&s.done){const rpeInput=row.querySelector('.rpe-input');if(rpeInput)rpeInput.onchange=()=>{const val=parseInt(rpeInput.value);if(val>=6&&val<=10)applyRPESuggestion(exLog,si,val);else rpeInput.value='';};}
        }
        setsWrap.appendChild(row);
        if(s.done)sessionVolume+=repKg(s)*(parseInt(s.reps)||0);
      });
    }
    renderSets();
    card.querySelector(".add-set").onclick=()=>{exLog.sets.push(ex.unilateral?{kgL:"",kgR:"",reps:"",done:false}:{kg:"",reps:"",done:false});saveState();renderSets();};
    const restBtn=card.querySelector("[data-rest]");if(restBtn)restBtn.onclick=()=>startTimer(restBtn.dataset.rest==="compound"?150:75,ex.name);
  });
  document.getElementById("dayProgress").textContent=doneCount+"/"+totalCount;
  document.getElementById("completeBanner").classList.toggle("show",totalCount>0&&doneCount===totalCount);
  document.getElementById("sessionSummary").classList.toggle("show",doneCount>0);
  if(doneCount>0)document.getElementById("sessionSummary").innerHTML=`<strong>Résumé</strong> Volume: ${sessionVolume.toFixed(0)} kg · PR aujourd'hui: ${prCount}`;
}
function estimate1RM(kg,reps){return kg*(1+reps/30);}
function renderWeekStepper(){
  const track=document.getElementById("weekTrack");track.innerHTML="";
  for(let w=1;w<=TOTAL_WEEKS;w++){let pct=0;DAY_ORDER.forEach(d=>{if(PROGRAM[d].exercises.some(e=>e.tempo))pct+=dayCompletionPct(w,d);});pct=Math.round(pct/DAY_ORDER.length);
    const dot=document.createElement("div");dot.className="week-dot"+(w===state.week?" current":"")+(pct===100?" full":"");
    dot.innerHTML="S"+w+(pct>0?`<span class="pct">${pct}%</span>`:"");dot.onclick=()=>{state.week=w;saveState();renderAll();};track.appendChild(dot);}
  document.getElementById("phaseLabel").textContent="Semaine "+state.week+" / "+TOTAL_WEEKS+" — "+PHASE_LABEL[phaseOf(state.week)];
  const intro=WEEK_INTRO[state.week];document.getElementById("weekBrief").innerHTML=intro?`<div class="wb-title">${intro.title}</div><div class="wb-text">${intro.text}</div>`:"";
  const progPct=Math.round(computeProgramProgress()/100);document.getElementById("programBarFill").style.width=progPct+"%";document.getElementById("programBarText").textContent=progPct+"% du programme";
  document.getElementById("weekCompleteBanner").style.display=(weekCompletionPct(state.week)===100&&state.week<TOTAL_WEEKS)?"flex":"none";
  let streak=0;for(let w=TOTAL_WEEKS;w>=1;w--){if(weekCompletionPct(w)===100)streak++;else break;}document.getElementById("programStreak").textContent=streak>0?"🔥 "+streak+" sem":"";
}
function dayCompletionPct(week,day){const ex=PROGRAM[day].exercises.filter(e=>e.tempo);if(!ex.length)return 0;const log=state.logs[logKey(week,day)];if(!log)return 0;const done=ex.filter(e=>log.exercises[e.id]&&log.exercises[e.id].sets.some(s=>s.done)).length;return Math.round(done/ex.length*100);}
function weekCompletionPct(week){let sum=0,n=0;DAY_ORDER.forEach(d=>{if(PROGRAM[d].exercises.some(e=>e.tempo)){sum+=dayCompletionPct(week,d);n++;}});return n?Math.round(sum/n):0;}
function computeProgramProgress(){let total=0,done=0;for(let w=1;w<=TOTAL_WEEKS;w++){DAY_ORDER.forEach(d=>{const ex=PROGRAM[d].exercises.filter(e=>e.tempo);total+=ex.length;const log=state.logs[logKey(w,d)];if(log)ex.forEach(e=>{if(log.exercises[e.id]&&log.exercises[e.id].sets.some(s=>s.done))done++;});});}return total?Math.round(done/total*100):0;}

let timerInterval=null;
function beep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,0.18,0.36].forEach((delay,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=i<2?880:1175;g.gain.value=0.001;const t=ctx.currentTime+delay;g.gain.exponentialRampToValueAtTime(0.18,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.16);});}catch(e){}}
function startTimer(secs,label){let remaining=secs;document.getElementById("timerOverlay").classList.add("show");document.getElementById("timerLabel").textContent="Repos — "+label;clearInterval(timerInterval);function tick(){const m=String(Math.floor(remaining/60)).padStart(2,"0"),s=String(remaining%60).padStart(2,"0");document.getElementById("timerNum").textContent=m+":"+s;if(remaining<=0){clearInterval(timerInterval);if(navigator.vibrate)navigator.vibrate([150,80,150]);beep();return;}remaining--;}tick();timerInterval=setInterval(tick,1000);}
document.getElementById("timerClose").onclick=()=>{document.getElementById("timerOverlay").classList.remove("show");clearInterval(timerInterval);};
document.getElementById("weekPrev").onclick=()=>{if(state.week>1){state.week--;saveState();renderAll();}};
document.getElementById("weekNext").onclick=()=>{if(state.week<TOTAL_WEEKS){state.week++;saveState();renderAll();}};
document.getElementById("weekCompleteBtn").onclick=()=>{if(state.week<TOTAL_WEEKS){state.week++;saveState();renderAll();}};
document.getElementById("themeToggle").onclick=()=>{state.theme=state.theme==='light'?'dark':'light';document.body.className=state.theme;saveState();};
document.getElementById("gearBtn").onclick=()=>{document.getElementById("modalOverlay").classList.add("show");};
document.getElementById("modalClose").onclick=()=>document.getElementById("modalOverlay").classList.remove("show");
// modal tabs
document.querySelectorAll('.tab').forEach(tab=>{tab.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');document.getElementById('tab-'+tab.dataset.tab).style.display='block';};});
document.getElementById('saveProfile').onclick=()=>{state.profile.shoulderWidth=document.getElementById('shoulderWidth').value;state.profile.armLength=document.getElementById('armLength').value;state.profile.bicepInsertion=document.getElementById('bicepInsertion').value;state.profile.sleepHours=parseFloat(document.getElementById('sleepHours').value)||7;state.profile.stressLevel=parseInt(document.getElementById('stressLevel').value)||3;state.profile.priorityGroup=document.getElementById('priorityGroup').value;saveState();alert('Profil enregistré.');renderAll();};
document.getElementById('calcMacros').onclick=()=>{const w=parseFloat(document.getElementById('nutWeight').value),goal=document.getElementById('nutGoal').value,act=parseFloat(document.getElementById('nutActivity').value);if(!w)return;const tdee=w*22*act;let cal=tdee;if(goal==='gain')cal+=300;else if(goal==='seche')cal-=300;const prot=w*(goal==='gain'?2.0:2.2),fat=w*1,carbs=(cal-prot*4-fat*9)/4;document.getElementById('macroResult').innerHTML=`<b>Calories:</b> ${Math.round(cal)} kcal<br><b>Protéines:</b> ${Math.round(prot)}g<br><b>Lipides:</b> ${Math.round(fat)}g<br><b>Glucides:</b> ${Math.round(carbs)}g`;};
document.getElementById('runMobilityTest').onclick=()=>{let issues=[];if(!confirm("Toucher orteils jambes tendues ?"))issues.push("Ischio-jambiers");if(!confirm("Mains derrière le dos ?"))issues.push("Épaules/pecs");if(!confirm("Squat profond talons au sol ?"))issues.push("Chevilles/hanches");document.getElementById('mobilityIssues').textContent=issues.length?"Limitations : "+issues.join(", "):"Aucune limitation.";};
// Measurements (simplifié)
document.getElementById('mAdd').onclick=()=>{const s=parseFloat(document.getElementById('mShoulders').value)||null,w=parseFloat(document.getElementById('mWaist').value)||null;if(!s&&!w)return;state.measurements.push({date:todayISO(),shoulders:s,waist:w});saveState();renderMeasurements();};
function renderMeasurements(){const wrap=document.getElementById('mHistory');wrap.innerHTML=state.measurements.slice(-5).reverse().map(m=>`<div>${m.date} Épaules:${m.shoulders||'-'} Taille:${m.waist||'-'}</div>`).join("")||"Aucune mesure.";}
// Day nav
const dayNav=document.getElementById('dayNav');DAY_ORDER.forEach(d=>{const b=document.createElement('button');b.className='day-btn';b.innerHTML=DAY_LABEL[d]+'<span class="grp">'+PROGRAM[d].groups.join("·")+'</span>';b.dataset.day=d;b.onclick=()=>{activeDay=d;renderDayNav();renderExercises();};dayNav.appendChild(b);});
function renderDayNav(){[...dayNav.children].forEach(b=>{b.classList.toggle('active',b.dataset.day===activeDay);b.classList.toggle('complete',dayCompletionPct(state.week,b.dataset.day)===100);});document.getElementById('dayTitle').textContent=PROGRAM[activeDay].title+(PROGRAM[activeDay].sub?" · "+PROGRAM[activeDay].sub:"");}
function renderAll(){renderWeekStepper();renderDayNav();renderExercises();}
// init
state=loadState();document.body.className=state.theme;renderAll();
})();
</script>
